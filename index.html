            <svg class="crw-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="crw-body">
            <p class="crw-notes">${escHtml(d.rw.notes)}</p>
            ${rwEvHtml}
          </div>
        </div>`;
    }

    const c=document.createElement('div');
    c.className='card';
    c.style.cssText=`--cc:${col}`;

    // ── Build carousel slides + filmstrip ────────────────────────────────
    const carSlides = [];
    const stripItems = [];

    if (INFOGRAPHICS[d.id]) {
      carSlides.push(`
        <div class="carousel-slide cs-infog" onclick="openLightbox('${INFOGRAPHICS[d.id]}','${escHtml(d.n)}')">
          <img class="cs-img" src="${INFOGRAPHICS[d.id]}" alt="Tactical infographic — ${escHtml(d.n)}" loading="lazy"
               onerror="this.closest('.ccarousel').style.display='none'">
          <span class="cs-badge cs-badge-infog">Infographic</span>
          <div class="cs-cap">AI-generated tactical diagram</div>
        </div>`);
      stripItems.push(`<button class="car-strip-item active" onclick="carGoto(this.closest('.ccarousel'),0)" title="Infographic">
        <img src="${INFOGRAPHICS[d.id]}" loading="lazy" onerror="this.style.opacity='.3'"></button>`);
    }
    const gallery = MEDIA_GALLERY[d.id];
    if (gallery) {
      gallery.videos.forEach(v => {
        const idx = carSlides.length;
        carSlides.push(`
          <div class="carousel-slide">
            <div class="cs-thumb" onclick="playCarVideo(this,'${v.id}')">
              <img class="cs-img" src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg"
                   alt="${escHtml(v.title)}" loading="lazy" onerror="this.style.opacity='.2'">
              <div class="cs-play-overlay">
                <div class="cs-play-btn">
                  <svg viewBox="0 0 24 24" width="20" height="20" fill="#ea580c"><path d="M8 5v14l11-7z"/></svg>
                </div>
              </div>
            </div>
            <span class="cs-badge cs-badge-yt">YouTube</span>
            <div class="cs-cap">${escHtml(v.title)}</div>
          </div>`);
        stripItems.push(`<button class="car-strip-item car-strip-yt" onclick="carGoto(this.closest('.ccarousel'),${idx})" title="${escHtml(v.title)}">
          <img src="https://img.youtube.com/vi/${v.id}/default.jpg" loading="lazy" onerror="this.style.opacity='.2'"></button>`);
      });
      gallery.images.forEach(img => {
        const idx = carSlides.length;
        carSlides.push(`
          <div class="carousel-slide" onclick="openLightbox('${img.src}','${img.cap.replace(/'/g,"\\'")}')">
            <img class="cs-img" src="${img.src}" alt="${escHtml(img.cap)}" loading="lazy"
                 onerror="this.closest('.carousel-slide').style.display='none'">
            <span class="cs-badge cs-badge-img">Image</span>
            <div class="cs-cap">${escHtml(img.cap)}</div>
          </div>`);
        stripItems.push(`<button class="car-strip-item" onclick="carGoto(this.closest('.ccarousel'),${idx})" title="${escHtml(img.cap)}">
          <img src="${img.src}" loading="lazy" onerror="this.style.opacity='.2'"></button>`);
      });
    }
    const total = carSlides.length;
    const carNav = total > 1 ? `
      <button class="car-nav car-prev" onclick="carMove(this,-1)">&#8249;</button>
      <button class="car-nav car-next" onclick="carMove(this,+1)">&#8250;</button>` : '';
    const stripHtml = total > 1
      ? `<div class="car-strip">${stripItems.join('')}</div>`
      : '';
    const carouselHtml = total > 0 ? `
      <div class="ccarousel" data-idx="0" data-total="${total}">
        <div class="ccarousel-view">
          <div class="carousel-track">${carSlides.join('')}</div>
          ${carNav}
        </div>
        ${stripHtml}
      </div>` : '';

    c.innerHTML=`
      <div class="ch">
        <div class="cnum">#${String(d.id+1).padStart(2,'0')}</div>
        <div class="ccat" style="background:color-mix(in srgb,${col} 15%,transparent);color:${col};border:1px solid color-mix(in srgb,${col} 40%,transparent)">${d.cat}</div>
        <div class="cvote" data-id="${d.id}">
          <button class="vbtn v-up${d.myVote===1?' voted':''}" title="${d.myVote===1?'Remove upvote':'Upvote'}">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M12 4L3 15h18L12 4z"/></svg>
          </button>
          <span class="vcnt" style="color:${d.votes > 0 ? '#059669' : d.votes < 0 ? '#ef4444' : col}">${d.votes}</span>
          <button class="vbtn v-down${d.myVote===-1?' voted':''}" title="${d.myVote===-1?'Remove downvote':'Downvote'}">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M12 20L3 9h18L12 20z"/></svg>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="cname">${d.n}</div>
        <div class="cdesc">${d.desc}</div>
        ${evHtml}
        ${rwHtml}
        <div class="cfoot">
          <div class="cm" style="position: relative;">
            <div class="mlabel" style="display:flex;align-items:center;">Est. Cost ${bdHtml}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);line-height:1.5;margin-top:3px">${d.cost}</div>
          </div>
          <div class="cm">
            <div class="mlabel">Cost Tier</div>
            <span class="cbadge" style="background:color-mix(in srgb,${ctC} 15%,transparent);color:${ctC};border:1px solid color-mix(in srgb,${ctC} 40%,transparent)">${ctL}</span>
          </div>
          <div class="cm">
            <div class="mlabel" style="display:flex;align-items:center;">Feasibility ${fjHtml}</div>
            <div class="fval" style="color:${fc}">${d.feas}</div>
            <div class="fbar"><div class="ffill" style="width:${fp}%;background:${fc}"></div></div>
          </div>
        </div>
      </div>
      ${carouselHtml}
      <div class="ccomments" data-id="${d.id}">
        <button class="cc-toggle" onclick="toggleComments(this,${d.id})">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          Comments
          <span class="cc-badge" id="cc-cnt-${d.id}">${(d.comments||[]).length||''}</span>
        </button>
        <div class="cc-body" id="cc-body-${d.id}">
          <div class="cc-list" id="cc-list-${d.id}"></div>
          <div class="cc-form">
            <textarea class="cc-input" id="cc-inp-${d.id}" rows="2" placeholder="Leave feedback…"></textarea>
            <button class="cc-submit" onclick="submitComment(${d.id})">Post</button>
          </div>
        </div>
      </div>`;  /* carousel + comments are siblings of card-body for list-view grid placement */
    g.appendChild(c);
  });
}

function rf(){
  const f=getFiltered();
  render(getSorted(f));
  renderTags(f);
}

// ── COMMENTS — Supabase-backed per-card feedback ──────────────────────────
const CC_HEADERS = { ...SB_HEADERS };  // reuse Supabase headers

// Load all comments for a given item and render them
async function loadComments(itemId) {
  const listEl  = document.getElementById(`cc-list-${itemId}`);
  const cntEl   = document.getElementById(`cc-cnt-${itemId}`);
  if (!listEl) return;

  try {
    const resp = await fetch(
      `${SB_URL}/rest/v1/comments?item_id=eq.${itemId}&order=created_at.asc&select=text,created_at`,
      { headers: CC_HEADERS }
    );
    if (!resp.ok) return;
    const rows = await resp.json();

    // Update badge
    cntEl.textContent = rows.length || '';
    cntEl.style.display = rows.length ? '' : 'none';

    // Render list
    if (!rows.length) {
      listEl.innerHTML = '<div class="cc-empty">// NO COMMENTS YET</div>';
      return;
    }
    listEl.innerHTML = rows.map(r => {
      const ago = timeAgo(new Date(r.created_at));
      return `<div class="cc-item">
        <div class="cc-meta">${ago}</div>
        <div class="cc-text">${escHtml(r.text)}</div>
      </div>`;
    }).join('');
  } catch(e) { /* silent fail */ }
}

async function submitComment(itemId) {
  const inp = document.getElementById(`cc-inp-${itemId}`);
  const btn = inp.closest('.cc-form').querySelector('.cc-submit');
  const text = inp.value.trim();
  if (!text) return;

  btn.disabled = true;
  try {
    const resp = await fetch(`${SB_URL}/rest/v1/comments`, {
      method: 'POST',
      headers: { ...CC_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ item_id: itemId, text })
    });
    if (resp.ok) {
      inp.value = '';
      await loadComments(itemId);
    }
  } catch(e) { /* silent */ }
  btn.disabled = false;
}

function toggleComments(btn, itemId) {
  const body = document.getElementById(`cc-body-${itemId}`);
  const isOpen = body.classList.toggle('open');
  if (isOpen) loadComments(itemId);
}

// ── CAROUSEL CONTROLS ────────────────────────────────────────────────────
function carMove(btn, dir) {
  const car = btn.closest('.ccarousel');
  stopCarVideo(car);
  const total = +car.dataset.total;
  const idx = ((+car.dataset.idx || 0) + dir + total) % total;
  carGoto(car, idx);
}

function carGoto(car, idx) {
  car.dataset.idx = idx;
  car.querySelector('.carousel-track').style.transform = `translateX(-${idx * 100}%)`;
  // Sync filmstrip
  const strip = car.querySelector('.car-strip');
  if (strip) {
    const items = strip.querySelectorAll('.car-strip-item');
    items.forEach((t, i) => t.classList.toggle('active', i === idx));
    if (items[idx]) items[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }
}

function playCarVideo(thumbEl, videoId) {
  const slide = thumbEl.closest('.carousel-slide');
  // Toggle: already playing? stop it
  const existing = slide.querySelector('iframe');
  if (existing) {
    existing.remove();
    thumbEl.style.display = '';
    return;
  }
  thumbEl.style.display = 'none';
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  iframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
  iframe.allowFullscreen = true;
  slide.insertBefore(iframe, slide.querySelector('.cs-cap') || null);
}

function stopCarVideo(car) {
  car.querySelectorAll('.carousel-slide iframe').forEach(f => {
    const thumb = f.closest('.carousel-slide').querySelector('.cs-thumb');
    if (thumb) thumb.style.display = '';
    f.remove();
  });
}

// Allow Ctrl+Enter to submit
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const inp = e.target.closest('.cc-input');
    if (inp) {
      const id = +inp.id.replace('cc-inp-', '');
      submitComment(id);
    }
  }
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60)  return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

// ── View toggle (list / 2-col grid) ──────────────────────────────────────
const gridEl   = document.getElementById('grid');
const vtList   = document.getElementById('vt-list');
const vtGrid   = document.getElementById('vt-grid');
const VIEW_KEY = 'fog_view_mode';

function applyView(mode) {
  gridEl.classList.toggle('view-list', mode === 'list');
  vtList.classList.toggle('active', mode === 'list');
  vtGrid.classList.toggle('active', mode === 'grid');
  LS.set(VIEW_KEY, mode);
}

vtList.addEventListener('click', () => applyView('list'));
vtGrid.addEventListener('click', () => applyView('grid'));

// Restore last-used view — default: grid on mobile (< 768px), list on desktop
const _defaultView = window.innerWidth < 768 ? 'grid' : 'list';
applyView(LS.get(VIEW_KEY) || _defaultView);
  
// ── INFO TOOLTIP — click toggle + overflow-safe repositioning ─────────────
document.addEventListener('click', e => {
  const wrap = e.target.closest('.info-wrap');

  // Close any open tooltip that was not the one just clicked
  document.querySelectorAll('.info-wrap.tip-open').forEach(el => {
    if (el !== wrap) el.classList.remove('tip-open');
  });

  if (!wrap) return;

  // Position the tooltip before showing it
  positionTooltip(wrap);
  wrap.classList.toggle('tip-open');
  e.stopPropagation();
});

function positionTooltip(wrap) {
  const tip = wrap.querySelector('.info-tooltip');
  if (!tip) return;

  // Reset to default so we can measure natural position
  wrap.style.removeProperty('--tip-tx');
  wrap.style.removeProperty('--tip-arrow');
  tip.style.removeProperty('left');

  // Make briefly visible-but-hidden to measure
  tip.style.visibility = 'hidden';
  tip.style.opacity    = '0';
  tip.style.display    = 'block';

  const tipRect  = tip.getBoundingClientRect();
  const vw       = window.innerWidth;
  const MARGIN   = 8; // px from screen edge

  let tx         = -50;   // default: centre on icon (%)
  let arrowLeft  = 50;    // default: centre arrow (%)

  if (tipRect.left < MARGIN) {
    // Overflows left — shift right
    const shift = MARGIN - tipRect.left;
    const tipW  = tipRect.width;
    tx = `calc(-50% + ${shift}px)`;
    // Move arrow left to stay above the icon
    const iconCx    = wrap.getBoundingClientRect().left + wrap.offsetWidth / 2;
    arrowLeft = Math.max(10, Math.min(90, ((iconCx - (tipRect.left + shift)) / tipW * 100)));
    arrowLeft = arrowLeft.toFixed(1) + '%';
  } else if (tipRect.right > vw - MARGIN) {
    // Overflows right — shift left
    const shift = tipRect.right - (vw - MARGIN);
    const tipW  = tipRect.width;
    tx = `calc(-50% - ${shift}px)`;
    const iconCx    = wrap.getBoundingClientRect().left + wrap.offsetWidth / 2;
    arrowLeft = Math.max(10, Math.min(90, ((iconCx - (tipRect.left - shift)) / tipW * 100)));
    arrowLeft = arrowLeft.toFixed(1) + '%';
  }

  wrap.style.setProperty('--tip-tx', tx);
  wrap.style.setProperty('--tip-arrow', typeof arrowLeft === 'number' ? arrowLeft + '%' : arrowLeft);

  tip.style.removeProperty('display');
  tip.style.removeProperty('visibility');
  tip.style.removeProperty('opacity');
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────
const lb    = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbCap = document.getElementById('lb-caption');

function openLightbox(src, alt) {
  lbImg.src = src;
  lbCap.textContent = alt || '';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
  // slight delay before clearing src so close animation plays
  setTimeout(() => { lbImg.src = ''; }, 200);
}

// Delegate click on carousel infographic slides → open lightbox
// (also handled via inline onclick; this catches edge cases)
document.getElementById('grid').addEventListener('click', e => {
  const slide = e.target.closest('.carousel-slide.cs-infog');
  if (!slide) return;
  const img = slide.querySelector('img');
  if (img) openLightbox(img.src, slide.closest('.card')?.querySelector('.cname')?.textContent);
});

// Touch-friendly evidence description toggle — tap row to expand/collapse
// (CSS :hover doesn't fire reliably on touch; ev-open class handles it)
document.getElementById('grid').addEventListener('click', e => {
  // Don't intercept link clicks
  if (e.target.closest('a')) return;
  const item = e.target.closest('.ev-item');
  if (!item) return;
  item.classList.toggle('ev-open');
}, { passive: true });

// Close on backdrop click or close button
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.getElementById('lb-close').addEventListener('click', closeLightbox);

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && lb.classList.contains('open')) closeLightbox();
});

// Boot: render all cards immediately (votes = 0), then update with real counts
rf();
loadVotes();
</script>
