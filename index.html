<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOG Countermeasures — 55 Innovative Solutions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap"></noscript>
<style>
:root{
  /* High Contrast Light Palette */
  --bg: #ffffff;
  --surface: #f8fafc;
  --card: #ffffff;
  --border: #e2e8f0;
  --border-hi: #cbd5e1;
  --accent: #0284c7;
  --accent2: #ea580c;
  --text: #0f172a;
  --muted: #64748b;
  --text-dim: #334155;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden;font-size:15.5px;line-height:1.6;}

/* HEADER */
header{position:relative;padding:48px 40px 32px;border-bottom:1px solid var(--border);background:var(--bg);overflow:hidden;}
.header-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end;}
.threat-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent2);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.threat-badge::before{content:'';display:inline-block;width:7px;height:7px;background:var(--accent2);border-radius:50%;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,5.5vw,72px);letter-spacing:2px;line-height:1;color:var(--text);}
h1 span{color:var(--accent);}
.subtitle{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:10px;letter-spacing:1px;}
.stats-row{display:flex;gap:24px;align-items:flex-end;}
.stat{text-align:right;font-family:'IBM Plex Mono',monospace;}
.stat-num{font-size:34px;font-weight:600;color:var(--accent);line-height:1;}
.stat-label{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px;}

/* FILTER PANEL */
.filter-panel{max-width:1400px;margin:0 auto;padding:0 40px;}
.filter-section{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.fgl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;width:96px;flex-shrink:0;font-weight:600;}
.fchips{display:flex;gap:7px;flex-wrap:wrap;flex:1;}
.chip{padding:6px 14px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;cursor:pointer;border-radius:3px;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
.chip:hover{border-color:var(--cc,var(--accent));color:var(--cc,var(--accent));}
.chip.active{background:var(--cc,var(--accent));color:#fff;border-color:var(--cc,var(--accent));font-weight:700;}
.range-wrap{display:flex;align-items:center;gap:16px;flex:1;}
.range-out{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);min-width:130px;font-weight:600;}
input[type=range]{flex:1;max-width:300px;-webkit-appearance:none;height:5px;background:var(--border);border-radius:3px;outline:none;cursor:pointer;transition:background .3s;touch-action:pan-x;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:none;box-shadow:0 1px 4px rgba(0,0,0,.2);}
/* Larger hit area on mobile */
@media (max-width: 768px) {
  input[type=range]{height:8px;}
  input[type=range]::-webkit-slider-thumb{width:28px;height:28px;}
  input[type=range]::-moz-range-thumb{width:28px;height:28px;}
}
input[type=range]::-moz-range-thumb{width:17px;height:17px;border-radius:50%;background:var(--accent);border:none;box-shadow:0 1px 4px rgba(0,0,0,.2);}
#rw-slider::-webkit-slider-thumb{background:#3b82f6;}
#rw-slider::-moz-range-thumb{background:#3b82f6;}
.search-wrap{position:relative;margin-left:auto;}
.search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
input[type=search]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px 7px 32px;font-family:'IBM Plex Mono',monospace;font-size:13px;border-radius:3px;width:220px;outline:none;transition:border-color .15s;}
input[type=search]:focus{border-color:var(--accent);}
input[type=search]::placeholder{color:var(--muted);}

/* ACTIVE TAGS */
.active-bar{max-width:1400px;margin:0 auto;padding:10px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:46px;border-bottom:1px solid var(--border);}
.atag{display:flex;align-items:center;gap:5px;padding:4px 11px;background:rgba(0,0,0,.03);border:1px solid var(--border);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:3px;text-transform:uppercase;}
.atag button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:13px;line-height:1;padding:0 0 0 4px;}
.clear-all-btn{margin-left:auto;padding:4px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:3px;text-transform:uppercase;transition:all .15s;}
.clear-all-btn:hover{border-color:var(--accent);color:var(--accent);}

/* SORT BAR */
.sort-bar{max-width:1400px;margin:0 auto;padding:11px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-right:4px;font-weight:600;}
.sbtn{padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:3px;text-transform:uppercase;transition:all .15s;}
.sbtn:hover,.sbtn.active{border-color:var(--accent);color:var(--accent);background:var(--surface);}
.rcnt{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:1px;}

/* GRID — default 2-col */
.grid{max-width:1400px;margin:0 auto;padding:28px 40px 56px;display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
@media(max-width:900px){.grid{grid-template-columns:1fr;}}

/* card-body always flex-col so gap/spacing works in both views */
.card-body{display:flex;flex-direction:column;gap:12px;flex:1;min-width:0;}
/* In 2-col grid view the infographic sits below card-body, full width */
.grid:not(.view-list) .cinfographic{margin-top:4px;}

/* LIST VIEW — card splits into 50% info / 50% infographic */
.grid.view-list{grid-template-columns:1fr;}
.grid.view-list .card{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:auto 1fr;
  gap:0 20px;
  align-items:start;
}
.grid.view-list .ch{
  grid-column:1 / -1;
  border-bottom:1px solid var(--border);
  padding-bottom:12px;
  margin-bottom:4px;
}
.grid.view-list .card-body{
  grid-column:1;
  grid-row:2;
  gap:10px;
}
.grid.view-list .ccarousel{
  grid-column:2;
  grid-row:2;
  margin-top:0;
  display:flex;
  flex-direction:column;
  min-height:240px;
}
.grid.view-list .ccarousel-view{
  flex:1;
  min-height:180px;
}
.grid.view-list .ccarousel .carousel-track,
.grid.view-list .ccarousel .carousel-slide{
  height:100%;
}
.grid.view-list .ccarousel .cs-img,
.grid.view-list .ccarousel iframe{
  height:100%;
  min-height:180px;
  object-fit:cover;
}
/* Comments span full width in list view */
.grid.view-list .ccomments{
  grid-column:1 / -1;
}

/* COMMENTS */
.ccomments{margin-top:4px;border-top:1px solid var(--border);padding-top:12px;}
.cc-toggle{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0;transition:color .15s;}
.cc-toggle:hover{color:var(--accent);}
.cc-toggle svg{flex-shrink:0;}
.cc-toggle .cc-badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;min-width:16px;text-align:center;}
.cc-body{display:none;margin-top:10px;flex-direction:column;gap:8px;}
.cc-body.open{display:flex;}
.cc-list{display:flex;flex-direction:column;gap:7px;}
.cc-item{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:9px 12px;}
.cc-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.cc-text{font-size:13px;color:var(--text-dim);line-height:1.6;}
.cc-form{display:flex;gap:6px;margin-top:4px;}
.cc-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 11px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;border-radius:4px;outline:none;transition:border-color .15s;resize:none;}
.cc-input:focus{border-color:var(--accent);}
.cc-submit{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .15s;white-space:nowrap;align-self:flex-end;}
.cc-submit:hover{background:#0369a1;}
.cc-submit:disabled{opacity:.5;cursor:default;}
.cc-empty{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:0;margin-left:12px;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.vtbtn{background:transparent;border:none;padding:5px 10px;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.vtbtn:hover{background:var(--surface);color:var(--text);}
.vtbtn.active{background:var(--accent);color:#fff;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:22px;position:relative;transition:all .2s;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.02);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--accent));opacity:0;transition:opacity .2s;border-radius:5px 5px 0 0;}
.card:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:10;}
.card:hover::before{opacity:1;}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.cnum{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);letter-spacing:1px;flex-shrink:0;padding-top:4px;}
.ccat{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:3px;white-space:nowrap;margin-top:4px;}

/* ENHANCED VOTE COMPONENT */
.cvote{display:flex;flex-direction:column;align-items:center;gap:1px;border:1px solid var(--border);border-radius:10px;padding:6px 10px;margin-left:auto;background:var(--surface);min-width:56px;flex-shrink:0;position:relative;overflow:visible;transition:border-color .15s, box-shadow .15s;}
.cvote:hover{border-color:var(--border-hi);box-shadow:0 2px 12px rgba(0,0,0,.07);}
.vbtn{background:none;border:1px solid transparent;color:var(--muted);cursor:pointer;padding:5px 8px;border-radius:6px;transition:all .15s;line-height:1;width:38px;height:30px;display:flex;align-items:center;justify-content:center;}
.vbtn.v-up:hover{color:#059669;background:rgba(5,150,105,.09);border-color:rgba(5,150,105,.3);}
.vbtn.v-down:hover{color:#ef4444;background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.3);}
.vbtn.v-up.voted{color:#fff;background:#059669;border-color:#059669;}
.vbtn.v-up.voted:hover{background:#047857;border-color:#047857;}
.vbtn.v-down.voted{color:#fff;background:#ef4444;border-color:#ef4444;}
.vbtn.v-down.voted:hover{background:#dc2626;border-color:#dc2626;}
.vcnt{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;min-width:36px;text-align:center;transition:color .2s, transform .15s;}
.cname{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:1px;color:var(--text);line-height:1.15;margin-top:4px;}
.cdesc{font-size:14px;line-height:1.7;color:var(--text-dim);flex:1;}

/* CAROUSEL — unified infographic + media viewer */
.ccarousel{border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--surface);margin-top:4px;user-select:none;}
/* Inner view: provides overflow:hidden for sliding + positioning context for arrows */
.ccarousel-view{position:relative;overflow:hidden;}
.carousel-track{display:flex;transition:transform .32s cubic-bezier(.4,0,.2,1);}
.carousel-slide{flex-shrink:0;width:100%;position:relative;overflow:hidden;}
.carousel-slide .cs-img{width:100%;height:250px;object-fit:cover;display:block;}
.carousel-slide iframe{width:100%;height:250px;border:none;display:block;}

/* Filmstrip thumbnail row */
.car-strip{display:flex;gap:5px;padding:6px 7px 5px;overflow-x:auto;background:var(--surface);border-top:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.car-strip::-webkit-scrollbar{height:3px;}
.car-strip::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
.car-strip-item{flex-shrink:0;width:54px;height:38px;border-radius:3px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s,opacity .15s;opacity:.55;background:#000;padding:0;position:relative;}
.car-strip-item img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.car-strip-item:hover{opacity:.85;}
.car-strip-item.active{border-color:var(--accent2);opacity:1;}
.car-strip-yt::after{content:'▶';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.25);pointer-events:none;}
.cs-thumb{position:relative;cursor:pointer;}
.cs-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);transition:background .15s;}
.cs-thumb:hover .cs-play-overlay{background:rgba(0,0,0,.5);}
.cs-play-btn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 16px rgba(0,0,0,.3);transition:transform .15s,box-shadow .15s;}
.cs-thumb:hover .cs-play-btn{transform:scale(1.1);box-shadow:0 4px 24px rgba(0,0,0,.4);}
.cs-cap{position:absolute;bottom:0;left:0;right:0;padding:22px 10px 8px;background:linear-gradient(transparent,rgba(0,0,0,.75));font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.92);line-height:1.4;pointer-events:none;z-index:15;}
.cs-badge{position:absolute;top:8px;left:8px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;font-weight:700;text-transform:uppercase;z-index:15;pointer-events:none;}
.cs-badge-infog{background:rgba(0,0,0,.5);color:#fff;}
.cs-badge-yt{background:rgba(234,88,12,.9);color:#fff;}
.cs-badge-img{background:rgba(0,0,0,.55);color:#fff;}
.car-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(4px);border:none;color:var(--text);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:20px;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,.18);padding:0;}
.car-nav:hover{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.car-prev{left:8px;}
.car-next{right:8px;}
.carousel-slide.cs-infog{cursor:zoom-in;}

/* EVIDENCE STYLING */
/* ── EVIDENCE SECTION — compact chip layout ─────────────────────────────── */
.cevid { margin-top:6px; border-radius:5px; padding:9px 11px; border-left:2px solid var(--cc,var(--accent)); border:1px solid rgba(0,0,0,.06); border-left-width:2px; background:rgba(0,0,0,.015); }
.ev-header { font-family:'IBM Plex Mono',monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:7px; display:flex; align-items:center; gap:6px; font-weight:700; }
.ev-header::after { content:''; flex:1; height:1px; background:rgba(0,0,0,.08); }
.ev-list { list-style:none; display:flex; flex-direction:column; gap:5px; }
.ev-item { position:relative; cursor:pointer; }
.ev-link-row { display:flex; align-items:center; gap:6px; }
.ev-icon { width:12px; height:12px; opacity:.7; flex-shrink:0; color:var(--cc,var(--accent)); }
.ev-link { color:var(--text-dim); text-decoration:none; font-size:12px; font-weight:600; font-family:'IBM Plex Mono',monospace; transition:color .15s; }
.ev-link:hover { color:var(--accent); text-decoration:underline; }
.ev-desc { display:none; font-size:11.5px; color:var(--text-dim); line-height:1.45; margin-left:18px; padding:5px 9px; background:rgba(0,0,0,.04); border-radius:3px; border-left:2px solid rgba(0,0,0,.08); margin-top:3px; }
.ev-item:hover .ev-desc, .ev-item.ev-open .ev-desc { display:block; }
/* small expand indicator */
.ev-link::after { content:' ›'; opacity:.35; font-size:10px; transition:transform .15s; display:inline-block; }
.ev-item.ev-open .ev-link::after { content:' ‹'; opacity:.6; }

/* INFO TOOLTIP (COST & FEASIBILITY) */
.info-wrap { position: relative; display: inline-flex; align-items: center; margin-left: 6px; cursor: pointer; vertical-align: middle; }
.info-icon { width: 13px; height: 13px; color: var(--muted); transition: color 0.2s; }
.info-wrap:hover .info-icon,
.info-wrap.tip-open .info-icon { color: var(--accent); }
.info-tooltip {
  position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(var(--tip-tx,-50%)) translateY(4px);
  background: var(--card); border: 1px solid var(--border-hi); border-radius: 4px; padding: 12px;
  width: max-content; min-width: 180px; max-width: min(260px, 88vw);
  opacity: 0; visibility: hidden; transition: opacity .18s, visibility .18s, transform .18s;
  z-index: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.15); pointer-events: none;
}
/* Desktop hover */
@media (hover: hover) {
  .info-wrap:hover .info-tooltip {
    opacity: 1; visibility: visible;
    transform: translateX(var(--tip-tx,-50%)) translateY(0);
    pointer-events: all;
  }
}
/* JS-driven tap toggle (touch or click) */
.info-wrap.tip-open .info-tooltip {
  opacity: 1; visibility: visible;
  transform: translateX(var(--tip-tx,-50%)) translateY(0);
  pointer-events: all;
}
.info-tooltip::after {
  content: ''; position: absolute; top: 100%;
  left: var(--tip-arrow, 50%); transform: translateX(-50%);
  border-width: 5px; border-style: solid;
  border-color: var(--border-hi) transparent transparent transparent;
}
.tooltip-header { font-family:'IBM Plex Mono',monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.bd-row { display: flex; justify-content: space-between; font-family:'IBM Plex Mono',monospace; font-size: 10.5px; color: var(--text-dim); margin-bottom: 6px; gap: 20px; }
.bd-val { color: var(--text); font-weight: 600; text-align: right; }
.bd-total { display: flex; justify-content: space-between; font-family:'IBM Plex Mono',monospace; font-size: 11px; color: var(--accent); border-top: 1px dashed var(--border); padding-top: 6px; margin-top: 6px; font-weight: 700; }

.cfoot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:6px;padding-top:14px;border-top:1px solid var(--border);}
.cm{display:flex;flex-direction:column;gap:4px;position:relative;}
.mlabel{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.mval{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--text);}
.cbadge{font-family:'IBM Plex Mono',monospace;font-size:11.5px;padding:3px 9px;border-radius:3px;font-weight:700;display:inline-block;margin-top:2px;}
.fbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px;}
.ffill{height:100%;border-radius:2px;}
.fval{font-family:'IBM Plex Mono',monospace;font-size:12px;margin-top:3px;font-weight:600;}

  {n:"Heated Tungsten Thread Barrier",cat:"Physical / Cable",desc:"Parallel grid of resistively heated tungsten wires (600–700 °C) suspended at 0.5–3 m height. Fiber-optic cable melts on contact in under 50 ms.",cost:"$200–$800/section",ct:0,cn:500,feas:"Medium-High", bd:[{k:"Tungsten Elem.",v:"50%"},{k:"Power Supply",v:"35%"},{k:"Clips/Mounts",v:"15%"}], fj:[{k:"TRL",v:"6 (Proto)"},{k:"Power Need",v:"High"},{k:"Limit",v:"Thermal Sig"}], ev:[{t:"Corning White Paper",u:"https://www.corning.com/microsites/coc/oem/documents/specialty-fiber/WP4250-Thermal-Stability-of-the-CPC-Fiber-Coating-System.pdf",type:"academic",d:"Technical white papers prove that silica fiber polymer coatings critically degrade at 150°C and undergo catastrophic decomposition at 300°C within minutes."},{t:"Stolov et al. (2008)",u:"https://www.researchgate.net/publication/228649202_Thermal_Stability_of_Specialty_Optical_Fibers",type:"academic",d:"Peer-reviewed thermodynamics studies confirm specialty optical fibers lose all structural integrity and signal capacity when exposed to targeted thermal thresholds."}],rw:{score:1,label:'Fixed perimeter only — not airborne-compatible',notes:'Tensioned electrified wire grids require fixed anchoring and high-voltage infrastructure that is incompatible with helicopter operations. Weight, power draw, and rotor-clearance requirements make airborne installation infeasible. Could protect a static helicopter pad but not an airborne asset.',ev:[]}},
  {n:"Aerial Fiber-Snare Net Projector",cat:"Physical / Cable",desc:"Shoulder-launched or vehicle-mounted system fires a 15×15 m bolo net to intercept low-altitude drones and their trailing cable.",cost:"$1,500–$4,000/shot",ct:1,cn:2500,feas:"Medium-High", bd:[{k:"Net Cartridge",v:"60%"},{k:"Launcher System",v:"30%"},{k:"Propellant",v:"10%"}], fj:[{k:"TRL",v:"8 (Deployed)"},{k:"Reload",v:"Slow"},{k:"Limit",v:"Close Range"}], ev:[{t:"Breaking Defense",u:"https://breakingdefense.com/2023/10/a-better-c-uas-option-capture-enemy-drones-in-a-net/",type:"news",d:"Fortem's DroneHunter autonomous net-capture systems are combat-proven with over 4,500 successful kinetic captures in active conflict zones."},{t:"OpenWorks SkyWall",u:"https://openworksengineering.com/skywall-patrol/",type:"news",d:"Handheld pneumatic net projectors successfully entangle low-altitude drone rotors and completely disable trailing payloads and tethers."},{t:'Fortem Technologies — DroneHunter F700',u:'https://fortemtech.com/products/dronehunter-f700/',type:'product',d:'Official product page for the DroneHunter F700 autonomous net-launching interceptor, deployed by US and allied forces.'},{t:'Interesting Engineering — DroneHunter 5.0',u:'https://interestingengineering.com/innovation/dronehunter5-interceptor-with-net-gun',type:'news',d:'DroneHunter 5.0 autonomously hunts and nets UAV swarms; awarded Pentagon contract for counter-swarm operations.'},{t:'BriefGlance — Fortem DroneHunter 5.0',u:'https://briefglance.com/articles/fortems-dronehunter-50-the-pentagons-new-answer-to-swarm-attacks',type:'news',d:'Pentagon adopts DroneHunter 5.0 as primary autonomous net-capture response to enemy drone swarm attacks.'},{t:'Fortem Technologies — DroneHunter 5.0 Deliveries Begin',u:'https://fortemtech.com/press-releases/2026-01-20-fortem-technologies-begins-deliveries-of-next-generation-dronehunter-5-0-advancing-counter-swarm-defense/',type:'news',d:'Fortem begins delivering next-generation DroneHunter 5.0 to advance counter-swarm defense capabilities.'},{t:'Business Wire — $18M US Army Contract',u:'https://www.businesswire.com/news/home/20260226465227/en/Fortem-Technologies-Awarded-3-Year-$18M-U.S.-Army-Contract-for-Counter-Drone-Solutions',type:'news',d:'Fortem awarded 3-year, $18M US Army contract for net-capture counter-drone solutions, validating operational maturity.'},{t:'DroneDJ — Army $18M Plan to Catch Rogue Drones',u:'https://dronedj.com/2026/02/26/army-rogue-drones-fortem-dronehunter/',type:'news',d:'US Army\'s $18M investment in DroneHunter confirms net-capture as a priority counter-UAS approach.'}],rw:{score:7,label:'Air-launch feasible; DroneHunter tested from fixed-wing',notes:'Net-projector interceptors like Fortem DroneHunter are autonomous UAVs that can be air-launched from helicopter hardpoints or ramps, serving as an organic C-UAS layer for rotary-wing task forces. The AH-64 Operation Flyswatter trials showed helicopters can carry and coordinate interceptor assets, and swarm-deployment from CH-47 rear ramp is a Boeing-confirmed concept.',ev:[{t:'The War Zone — AH-64E Counter-Drone Capability',u:'https://www.twz.com/air/u-s-army-ah-64e-apaches-counter-drone-capability-rapidly-matures',type:'news',d:'AH-64E Apache confirmed using radar and Link 16 to coordinate with interceptor assets against drone targets.'},{t:'The War Zone — CH-47 Drone Swarm Launcher',u:'https://www.twz.com/air/ch-47-chinook-air-launching-swarms-of-drones-touted-as-future-feature',type:'news',d:'CH-47 Chinook concept for deploying coordinated interceptor drone swarms via rear-ramp palletized launchers.'},{t:'Fortem Technologies — DroneHunter F700',u:'https://fortemtech.com/products/dronehunter-f700/',type:'product',d:'DroneHunter F700 designed as an autonomous air-launch capable interceptor platform suitable for helicopter-host integration.'}]}},
  {n:"Drone-Mounted Cable Cutter",cat:"Physical / Cable",desc:"Small interceptor drone equipped with counter-rotating serrated blades designed to sever the trailing fiber cable mid-air.",cost:"$800–$2,500/unit",ct:1,cn:1500,feas:"High", bd:[{t:"Drone Platform",v:"50%"},{k:"Cutting Mech.",v:"30%"},{k:"Targeting AI",v:"20%"}], fj:[{k:"TRL",v:"7 (Testing)"},{k:"Precision",v:"High"},{k:"Limit",v:"Needs Cueing"}], ev:[{t:"U.S. Army C-UAS",u:"https://www.army.mil/article/287737/fiber_optic_drones_posing_a_significant_c_uas_challenge",type:"news",d:"U.S. Army C-UAS reports explicitly discuss drone-on-drone kinetic interception as a primary method to physically sever guidance tethers mid-air."},{t:"Bulgarian Military",u:"https://bulgarianmilitary.com/2024/12/05/russia-explores-countermeasures-for-fiber-optic-fpv-drones/",type:"news",d:"Adversary RFI documents reveal active development of FPV-mounted serrated cable cutters to neutralize FOG systems without full drone destruction."}],rw:{score:7,label:'Helicopter-launched UAS cutter — operationally promising',notes:'Cable-cutter interceptor drones are small enough to be carried on helicopter stub-wing pylons or deployed from cabin dispensers. Helicopter speed and altitude give the interceptor a decisive energy advantage to close on a low-flying FOG drone and sever its tether. Ukraine\'s spinning-cable "Elka" devices are infantry-held but the concept scales to helicopter-launched autonomous seekers.',ev:[{t:'RFE/RL — Ukraine Elka FPV Drone-Killing Device',u:'https://www.rferl.org/a/anti-drone-technology-russia-invasion-ukraine-elka-fpv-threat/33737266.html',type:'news',d:'Spinning-cable drone interceptors (Elka) proven in combat; the concept is adaptable to helicopter-launched form factor.'},{t:'Army.mil — Apache Counter-UAS Demonstration',u:'https://www.army.mil/article/289073/apache_helicopter_proves_advanced_counter_uas_capabilities_in_live_demonstration',type:'news',d:'AH-64E demonstrated 13/14 drone kills in Operation Flyswatter, confirming helicopter platform viability for UAS intercept.'}]}},
  {n:"Underwater Fiber-Snare Boom",cat:"Physical / Cable",desc:"A submerged boom of vertical monofilament lines spanning waterways that FOG drones must cross at low altitude.",cost:"$500–$2,000/deployment",ct:1,cn:1000,feas:"High", bd:[{k:"Sensing Pods",v:"60%"},{k:"Monofilament",v:"20%"},{k:"Anchors",v:"20%"}], fj:[{k:"TRL",v:"9 (COTS)"},{k:"Power Need",v:"Zero"},{k:"Limit",v:"Waterways"}], ev:[{t:"Optics11 Security",u:"https://optics11.com/underwater-security/the-unseen-drone-wall-why-europe-needs-an-underwater-layer-and-how-optibarrier-delivers-it/",type:"news",d:"Submerged monofilament and fiber-optic sensor barriers are successfully deployed to secure waterways against low-altitude and underwater infiltration."},{t:"Sensors (2022) Survey",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC9143730/",type:"academic",d:"Academic threat surveys validate underwater physical snare networks as highly effective, zero-power passive defenses against UUV and low-flying UAV threats."}],rw:{score:3,label:'Maritime helicopter role only — niche ASW application',notes:'Underwater snare booms are relevant to maritime patrol helicopters (MH-60R, NH90) operating in littoral environments where submarine-launched or waterborne FOG drones are a threat. Deployment requires hovering over water with a winch system, analogous to sonobuoy or dipping sonar operations. Operationally very limited.',ev:[{t:'Lockheed Martin — MH-60R Seahawk',u:'https://www.lockheedmartin.com/en-us/products/mh-60r-maritime-helicopter.html',type:'product',d:'MH-60R Seahawk carries winch, sonobuoys, and dipping sonar — establishing the hardware and crew procedures for towed underwater payloads.'}]}},
  {n:"Electrified Perimeter Grid",cat:"Physical / Cable",desc:"Tensioned stainless-steel grid carrying high-voltage pulses. Fiber contact triggers arc-fusion and severs the core.",cost:"$2,000–$8,000/100 m",ct:1,cn:5000,feas:"Medium-High", bd:[{k:"HV Generator",v:"55%"},{k:"Steel Grid",v:"30%"},{k:"Alarm System",v:"15%"}], fj:[{k:"TRL",v:"8 (Deployed)"},{k:"Deterrence",v:"High"},{k:"Limit",v:"Fratricide Risk"}], ev:[{t:"Drone Defence SkyFence",u:"https://www.dronedefence.co.uk/skyfence/",type:"news",d:"Commercial electrified perimeter meshes successfully disrupt control signals and physically destroy drone electronics via arc-fusion on contact."},{t:"Pentagon JIATF-401",u:"https://media.defense.gov/2026/Jan/30/2003868750/-1/-1/0/JIATF-401-GUIDE-FOR-PHYSICAL-PROTECTION-OF-CRITICAL-INFRASTRUCTURE.PDF",type:"news",d:"Department of Defense guidelines mandate layered physical security perimeters with integrated sensors to protect critical infrastructure from UAS."}],rw:{score:1,label:'Incompatible with airborne platforms',notes:'High-voltage tensioned wire grids require fixed ground anchoring and mains-level power supplies. They are physically incompatible with mounting on a rotary-wing platform and offer no self-protection value to a helicopter in flight. Only conceivable use is pre-hardening a helicopter pad before operations.',ev:[]}},
  {n:"Mylar Balloon Wall",cat:"Physical / Cable",desc:"Grid of metallized Mylar balloons tethered at 5–50 m altitude, connected by monofilament cross-lines.",cost:"$50–$150/balloon",ct:0,cn:100,feas:"High", bd:[{k:"Balloons/Gas",v:"60%"},{k:"Tethers",v:"20%"},{k:"Reflectors",v:"20%"}], fj:[{k:"TRL",v:"9 (Combat)"},{k:"Deploy Time",v:"Rapid"},{k:"Limit",v:"Wind Sens."}], ev:[{t:"The War Zone - Balloons",u:"https://www.twz.com/china-seen-using-radar-reflector-balloons-to-defend-key-targets",type:"news",d:"The PLA actively utilizes tethered metallized balloons to create dense, low-cost physical entanglement meshes while simultaneously boosting radar detection."}],rw:{score:4,label:'Helicopter-deployable barrage balloons — limited practicality',notes:'Metallized Mylar barrage balloons have historically been deployed from aircraft and ships. A helicopter could rapidly seed a defensive balloon screen over a critical area, and the monofilament interconnections would entangle FOG tether lines of pursuing drones. Wind sensitivity and rotor-downwash interference during deployment are key limitations.',ev:[{t:'Wikipedia — Barrage Balloon',u:'https://en.wikipedia.org/wiki/Barrage_balloon',type:'wiki',d:'Barrage balloons were historically deployed from ships and aircraft; helicopter deployment of scaled-down versions to protect LZs is conceptually valid.'}]}},
  {n:"Fiber-Dissolving Chemical Spray",cat:"Physical / Cable",desc:"A mist of sodium hydroxide aerosol (pH 14+) along approach corridors that fractures silica fibers within seconds.",cost:"$200–$600/deployment",ct:0,cn:400,feas:"Medium", bd:[{k:"Chemical Agent",v:"50%"},{k:"Sprayer/Pad",v:"35%"},{k:"Logistics",v:"15%"}], fj:[{k:"TRL",v:"5 (Lab)"},{k:"Toxicity",v:"High"},{k:"Limit",v:"Contamination"}], ev:[{t:"arXiv - Fiber Stripping",u:"https://arxiv.org/html/2510.00335v1",type:"academic",d:"Laboratory testing proves that methanol and acetone solutions rapidly dissolve the adhesive polyimide coatings protecting optical glass fibers."},{t:"Chemical Damage Paper",u:"https://www.researchgate.net/publication/229013349_Mechanical_and_chemical_damage_of_optical_fiber_polymer_coating",type:"academic",d:"Chemical solvents like methylene chloride aggressively degrade and remove optical fiber polymer coatings in under 60 seconds, causing structural failure."}],rw:{score:5,label:'Helicopter spray-bar delivery is technically feasible',notes:'Helicopters routinely carry liquid spray systems for firefighting, agricultural, and defoliation missions. A sodium hydroxide aerosol could be dispensed from a spray bar to create corridor-denial zones that fracture silica fibers on contact. The main limitation is collateral hazard to personnel and equipment from alkaline mist.',ev:[{t:'US Army — TF ODIN Aerial Spray Systems',u:'https://www.army.mil/article/55447',type:'news',d:'US Army helicopter-mounted liquid spray systems (used for defoliation and area treatment) demonstrate the delivery platform exists for chemical spray countermeasures.'}]}},
  {n:"Laser Dazzler Array",cat:"Optical",desc:"Low-power green/red lasers slaved to AI tracker to saturate CMOS sensors, blinding operator video feed.",cost:"$3,000–$12,000/system",ct:1,cn:7000,feas:"High", bd:[{k:"Laser Emitter",v:"50%"},{k:"AI Tracker",v:"35%"},{k:"Camera/Optics",v:"15%"}], fj:[{k:"TRL",v:"8 (Deployed)"},{k:"Collateral",v:"Low"},{k:"Limit",v:"LoS Required"}], ev:[{t:"The War Zone - Dazzlers",u:"https://www.twz.com/land/laser-dazzlers-for-defending-tanks-against-marauding-drones-are-an-untapped-countermeasure",type:"news",d:"In-depth military analysis confirms laser dazzlers effectively blind optical sensors on marauding drones, providing a non-kinetic defense for armored vehicles."},{t:"EOS Laser Demonstration",u:"https://www.defenseadvancement.com/news/laser-powered-counter-drone-solution-successfully-demonstrated/",type:"news",d:"Live-fire demonstrations successfully proved integrated laser dazzler systems can permanently saturate and disable drone CMOS cameras at tactical ranges."},{t:'Laser Pointer Safety — Dazzler News Roundup',u:'https://www.laserpointersafety.com/news/news/other-news_files/tag-dazzler.php',type:'news',d:'Comprehensive news roundup on laser dazzler deployments for counter-drone operations worldwide.'},{t:'Unmanned Airspace — CILAS C-UAS Laser (Paris Olympics)',u:'https://www.unmannedairspace.info/counter-uas-systems-and-policies/cilas-to-provide-lasers-to-paris-olympics-and-paralympics-c-uas-effort/',type:'news',d:'CILAS laser dazzler selected for Paris Olympics counter-UAS programme, demonstrating operational readiness in high-security environments.'},{t:'Army Recognition — CILAS HELMA-P at IDEX 2023',u:'https://armyrecognition.com/news/army-news/army-news-2023/idex-2023-cilas-from-france-displays-laser-target-designators-helma-p-counter-uav-laser-weapon',type:'news',d:'CILAS HELMA-P counter-UAV laser weapon demonstrated at IDEX 2023, targeting drone optical sensors.'},{t:'New Atlas — US Navy Laser Dazzler Deployment',u:'https://newatlas.com/military/us-navy-laser-dazzzler-weapon-drone/',type:'news',d:'US Navy deploys its first operational anti-drone laser dazzler weapon, blind-saturating drone cameras.'},{t:'Defense Advancement — Laser Counter-Drone Demo',u:'https://www.defenseadvancement.com/news/laser-powered-counter-drone-solution-successfully-demonstrated/',type:'news',d:'Successful field demonstration of laser-powered counter-drone dazzler system against fast-moving UAV targets.'}],rw:{score:10,label:'Production-deployed — CIRCM/LAIRCM on 1,500+ US Army helicopters',notes:'Directed infrared countermeasure (DIRCM) laser systems are among the most mature helicopter self-protection technologies. The AN/AAQ-24 LAIRCM and successor CIRCM laser dazzlers are fitted on AH-64E Apache, UH-60 Black Hawk, CH-47 Chinook, and MH-47G Chinook. Germany\'s CH-47F Block II also receives CIRCM. These systems can be adapted to dazzle FOG drone cameras, not just defeat IR missiles.',ev:[{t:'The War Zone — Apaches Flying with CIRCM Lasers',u:'https://www.twz.com/army-apaches-are-now-flying-with-new-infrared-missile-thwarting-lasers',type:'news',d:'AH-64E Apaches confirmed flying with CIRCM quantum cascade laser countermeasure system replacing LAIRCM.'},{t:'The War Zone — Black Hawks Getting Laser Countermeasures',u:'https://www.twz.com/29240/army-black-hawks-are-finally-getting-laser-countermeasures-to-throw-off-infrared-missiles',type:'news',d:'UH-60 Black Hawk fleet receives AN/AAQ-24(V)N LAIRCM laser countermeasures — same gimballed laser architecture dazzles drone cameras.'},{t:'The Aviationist — CIRCM on 1,500 US Army Helicopters',u:'https://theaviationist.com/2023/03/03/a-very-close-look-at-the-anti-missile-system-that-will-equip-1500-us-army-helicopters/',type:'news',d:'CIRCM program equips 1,500+ US Army helicopters (AH-64, CH-47, UH-60) with precision laser countermeasures tuned for electro-optical threats.'},{t:'Zona Militar — German CH-47F Gets CIRCM',u:'https://www.zona-militar.com/en/2026/03/14/the-future-ch-47f-block-ii-helicopters-of-the-german-armed-forces-will-be-equipped-with-northrop-grummans-circm-countermeasure-systems/',type:'news',d:'Germany\'s CH-47F Block II helicopters will be equipped with Northrop Grumman CIRCM — confirming allied export adoption.'}]}},
  {n:"Pulsed Strobe Saturator",cat:"Optical",desc:"High-intensity xenon strobes pulsing at 30 Hz to saturate drone cameras with rolling shutter artifacts.",cost:"$500–$2,500/unit",ct:1,cn:1500,feas:"High", bd:[{k:"Xenon Tubes",v:"45%"},{k:"Capacitors",v:"40%"},{k:"Housing",v:"15%"}], fj:[{k:"TRL",v:"8 (COTS Base)"},{k:"Coverage",v:"Wide"},{k:"Limit",v:"Reveals Pos."}], ev:[{t:"PMC Sensor Damage",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC9002732/",type:"academic",d:"Peer-reviewed optical research confirms that intense pulsed laser/strobe light causes irreversible damage to CCD and CMOS sensors at ranges exceeding 500m."},{t:"Saturation Thresholds",u:"https://pmc.ncbi.nlm.nih.gov/articles/PMC3545610/",type:"academic",d:"Calculated saturation irradiance thresholds prove that intense point light sources induce severe rolling shutter artifacts, completely blinding video feeds."},{t:'arXiv — Rolling Shutter Vulnerability in CMOS Sensors',u:'https://arxiv.org/abs/2101.10011v1',type:'paper',d:'Peer-reviewed research demonstrating inherent rolling-shutter vulnerability in drone cameras exploitable by pulsed strobe illumination.'},{t:'Oxford University Research Archive — Rolling Shutter Study',u:'https://ora.ox.ac.uk/objects/uuid:74e44ce9-78e7-4d60-bc28-c7251addbd4c',type:'paper',d:'Oxford-hosted study on rolling-shutter sensor blindness, providing the academic basis for optical strobe countermeasures.'}],rw:{score:6,label:'Externally mountable; rotor-shadow interference limits effectiveness',notes:'A high-intensity strobe array could be integrated into a helicopter\'s belly or sponson to saturate the rolling-shutter sensors of approaching FOG drones. The cyclic rotor occlusion creates a natural strobe effect that could be synchronized with dedicated emitters. Weight and power draw are modest (similar to aircraft lighting systems), but rotor shadow interference requires careful positioning.',ev:[{t:'arXiv — Rolling Shutter Vulnerability in CMOS Sensors',u:'https://arxiv.org/abs/2101.10011v1',type:'paper',d:'Demonstrates inherent rolling-shutter sensor vulnerability exploitable by strobe illumination — applicable to drone cameras targeting helicopters.'}]}},
  {n:"IR Laser Spoofing Grid",cat:"Optical",desc:"IR lasers (850 nm) create a false thermal/optical horizon to confuse AI auto-tracking systems.",cost:"$5,000–$20,000/system",ct:2,cn:12000,feas:"Medium-High", bd:[{k:"IR Emitters",v:"60%"},{k:"Control Unit",v:"25%"},{k:"Power Dist.",v:"15%"}], fj:[{k:"TRL",v:"6 (Proto)"},{k:"Efficacy",v:"Medium"},{k:"Limit",v:"Target Dep."}], ev:[{t:"EMSOPEDIA - DIRCM",u:"https://www.emsopedia.org/entries/directed-infrared-countermeasure-dircm/",type:"news",d:"DIRCM systems successfully utilize modulated IR laser beams to inject false signals into infrared seekers, causing catastrophic tracking loop failures."},{t:"DSIAC - IRCM Inquiry",u:"https://dsiac.dtic.mil/technical-inquiries/notable/infrared-countermeasure-ircm-technology-for-rotorcrafts-and-unmanned-aerial-vehicles-uavs/",type:"news",d:"Official technical inquiries validate the use of miniaturized IRCM technologies to defend unmanned systems and rotorcraft against EO/IR guided threats."},{t:'arXiv — Adversarial IR Patches for Sensor Spoofing',u:'https://arxiv.org/pdf/2303.13868',type:'paper',d:'Research demonstrating learnable adversarial infrared patches that spoof IR-based drone detection and targeting systems.'}],rw:{score:6,label:'EW pod integration feasible; IRCM precedent exists',notes:'IR spoofing emitters are a logical extension of existing helicopter DIRCM/IRCM systems. The AN/ALQ-144 "disco ball" IR jammer is already deployed on AH-64A and other helicopters to spoof IR seekers. Extending this to FOG drone EO/IR camera spoofing requires new waveform programming but uses existing hardware mounting points and power bus.',ev:[{t:'FAS — AN/ALQ-144 Active IR Countermeasure',u:'https://man.fas.org/dod-101/sys/ac/equip/an-alq-144.htm',type:'news',d:'AN/ALQ-144 omnidirectional IR jammer — already fitted on AH-64A Apache — provides the platform precedent for helicopter-mounted IR spoofing systems.'}]}},

rborne-compatible',notes:'Multi-spectral camouflage nets (ULCANS, Barracuda) are deployed over stationary helicopters at FARPs and hides to defeat overhead drone reconnaissance. They provide excellent visual, IR, and radar signature reduction for parked aircraft but are entirely incompatible with airborne operations. Deployment and recovery from a helicopter is faster than building a hide.',ev:[{t:'Saab Barracuda — ULCAS Product Page',u:'https://www.saab.com/products/ulcas',type:'product',d:'ULCAS multi-spectral concealment system explicitly marketed for aircraft at rest under camouflage nets at forward operating bases.'}]}},

sorbing and IR-suppressing surface treatments; adding photochromic layers is an incremental step.',ev:[{t:'ResearchGate — IR Signature Suppression on Military Helicopters',u:'https://www.researchgate.net/publication/333548732_Infrared_Signature_Suppression_Systems_in_Modern_Military_Helicopters',type:'paper',d:'Academic survey of IR signature suppression systems on helicopters including surface coatings — directly relevant to photochromic spray application to airframes.'}]}},

  {n:"Compressed-Air Flechette Launcher",cat:"Kinetic",desc:"12-bore launchers with tungsten flechette rounds, AI-slaved to micro-radar. Favorable cost-exchange ratio.",cost:"$2,000–$8,000/station",ct:1,cn:5000,feas:"High", bd:[{k:"Radar/AI",v:"50%"},{k:"Launcher",v:"30%"},{k:"Ammunition",v:"20%"}], fj:[{k:"TRL",v:"8 (COTS)"},{k:"Cost Ratio",v:"High"},{k:"Limit",v:"Collateral"}], ev:[{t:"The War Zone - Ammo",u:"https://www.twz.com/news-features/shotgun-pellet-like-rifle-ammo-gun-mounted-jammers-on-marine-anti-drone-wishlist",type:"news",d:"The USMC actively procures 12-bore and 40mm flechette/canister rounds for close-range drone defeat due to their highly favorable cost-exchange ratio."},{t:"Eclipse Air Launchers",u:"https://eclipsedefense.com/products/",type:"news",d:"Commercial air-powered launchers successfully deploy anti-drone net and flechette projectiles with minimal sound and thermal signatures."},{t:'RoboRounds — Kinetic Anti-Drone Projectiles',u:'https://www.roborounds.com/',type:'product',d:'Official site for RoboRounds kinetic anti-drone flechette rounds designed to intercept low-altitude UAVs.'}],rw:{score:7,label:'Helicopter rocket pod precedent — clear integration pathway',notes:'Helicopters routinely carry 2.75" HYDRA-70 and 70mm APKWS rocket pods. A dedicated flechette anti-drone pod (analogous to RoboRounds) could be loaded on existing M261 launchers. The AH-64 Operation Flyswatter demonstrated 30mm and rocket engagement of drones; a purpose-optimised flechette salvo would improve probability of kill against small UAVs. Installation is a software and warhead change, not a new integration.',ev:[{t:'Army.mil — Apache Counter-UAS Demonstration',u:'https://www.army.mil/article/289073/apache_helicopter_proves_advanced_counter_uas_capabilities_in_live_demonstration',type:'news',d:'AH-64E uses existing rocket pod hardpoints against drone targets — same pylons accept flechette-optimised counter-drone munitions.'},{t:'Wikipedia — APKWS Laser-Guided Rocket' ationist — Apache Operation Flyswatter',u:'https://theaviationist.com/2025/11/21/operation-flyswatter-apache-c-uas/',type:'news',d:'AH-64E validated as counter-drone platform, confirming helicopter hardpoints and sensor suites support air-launch of interceptor munitions.'}]}},

  {n:"Laser-Guided Flechette Shell",cat:"Kinetic",desc:"Precision 40 mm grenade dispersing 200 flechettes via AI-triggered burst point.",cost:"$15,000–$40,000/launcher",ct:2,cn:27000,feas:"Medium-High", bd:[{k:"Guidance Kit",v:"60%"},{k:"Flechette Warhead",v:"30%"},{k:"Rocket Motor",v:"10%"}], fj:[{k:"TRL",v:"8 (Combat)"},{k:"Lethality",v:"High"},{k:"Limit",v:"Laser Seek Req."}], ev:[{t:"Thales Guided Rockets",u:"https://www.twz.com/air/thales-anti-drone-rockets-now-being-used-in-ukraine",type:"news",d:"70mm laser-guided rockets armed with airburst warheads disperse thousands of steel sub-projectiles, proving highly effective against drones in Ukraine."},{t:"AHEAD Ammunition",u:"https://en.wikipedia.org/wiki/AHEAD_ammunition",type:"news",d:"Programmable tungsten airburst sub-projectile ammunition provides a massive 60:1 cost-exchange advantage against $1,500 FPV threats."},{t:'The War Zone — Thales Anti-Drone Rockets in Ukraine',u:'https://www.twz.com/air/thales-anti-drone-rockets-now-being-used-in-ukraine',type:'news',d:'Thales laser-guided rockets confirmed in Ukrainian combat use against drone targets, proving flechette shell effectiveness.'},{t:'Wikipedia — APKWS Laser-Guided Rocket',u:'https://en.wikipedia.org/wiki/Advanced_Precision_Kill_Weapon_System',type:'wiki',d:'Reference entry for the Advanced Precision Kill Weapon System (APKWS) laser-guided flechette rocket used against drones.'}],rw:{score:8,label:'APKWS on helicopters — combat proven drone killer',notes:'The Advanced Precision Kill Weapon System (APKWS) laser-guided flechette rocket is already qualified and combat-proven on AH-64 Apache and UH-60 Black Hawk via M261 launchers. Ukraine uses Thales LPD laser-guided rockets against drone targets. The APKWS warhead can be optimised for drone kill — a software and fuze change on an already-fielded helicopter weapon system.',ev:[{t:'The War Zone — Thales Anti-Drone Rockets in Ukraine',u:'https://www.twz.com/air/thales-anti-drone-rockets-now-being-used-in-u '}],rw:{score:6,label:'Airborne passive bistatic radar demonstrated; helicopter integration feasible',notes:'Airborne passive bistatic radar using FM and 4G/5G signals of opportunity has been demonstrated on light aircraft. A helicopter-carried passive radar receiver would exploit urban and suburban 5G infrastructure to detect low-flying FOG drones without emitting a radar signature. The receiver is compact (antenna array + SDR processing), fitting within a helicopter EW pod.',ev:[{t:'ResearchGate — Airborne Passive Bistatic Radar',u:'https://www.researchgate.net/publication/224180238_Air_target_detection_using_airborne_passive_bistatic_radar',type:'paper',d:'Demonstrates airborne passive bistatic radar on a light aircraft for air target detection — directly analogous to helicopter-carried 5G passive radar integration.'},{t:'HENSOLDT — Twinvis Passive Radar',u:'https://www.hensoldt.net/products/twinvis-passive-radar-surveillance-of-noiseless-objects',type:'product',d:'HENSOLDT Twinvis passive radar exploits broadcast signals for silent drone detection — adaptable to helicopter-carried receiver module.'}]}},
  {n:"Retro-Reflection Flash Detector",cat:"Detection",desc:"Pulsed LED flash array measuring cat's eye retro-reflection from drone lenses.",cost:"$2,000–$8,000/unit",ct:1,cn:5000,feas:"Medium-High", bd:[{k:"LED Emitter",v:"45%"},{k:"Photodetector",v:"40%"},{k:"Optics",v:"15%"}], fj:[{k:"TRL",v:"7 (Deployed)"},{k:"Portability",v:"High"},{k:"Limit",v:"Lens Angle Dep."}], ev:[{t:"Springer Cat's Eye",u:"https://link.springer.com/article/10.1631/FITEE.2500522",type:"academic",d:"Deep learning models integrated with active laser detection successfully identify the unique 'cat's eye' retro-reflection of drone camera lenses."},{t:"Active Detection Paper",u:"https://www.sciencedirect.com/science/article/pii/S2211379724007150",type:"academic",d:"Theoretical and field testing proves pulsed LED flash arrays can reliably pinpoint drone optical payloads at ranges between 200m and 800m."},{t:'Torrey Pines Logic — Optical Detection Systems',u:'https://tplogic.com/optical-detection/',type:'product',d:'Torrey Pines Logic product family for passive optical drone detection via retroreflective lens flash signature.'},{t:'Torrey Pines Logic — Beam 230 Surveillance System',u:'https://tplogic.com/optical-detection/beam-230/',type:'product',d:'Beam 230 24-hour optical surveillance system detecting drone camera retroreflection at standoff distances.'},{t:'Torrey Pines Logic — Sentinel S45 System',u:'https://tplogic.com/optical-detection/sentinel-s45/',type:'product',d:'Sentinel S45 passive optical sensor detecting drone lens retroreflective signatures day or night.'}],rw:{score:7,label:'EO/IR sensor integration on helicopter is mature technology',notes:'Helicopters carry FLIR-based EO/IR turret systems (e.g., L3 WESCAM MX-15, Raytheon ATFLIR) with enough sensitivity to detect retroreflective lens flashes from FOG drone cameras. Integrating a passive optical threat detector alongside existing turret sensors is a software update and filter addition. The Torrey Pines Logic Sentinel S45 form factor fits easily on a helicopter nose station.',ev:[{t:'Torrey Pines Logic — Beam 230 Optical Surveillance',u:'https://tplogic.com/optical-detection/beam-230/',type:'product',d:'Beam-230 optical detector identifies drone camera retroreflection — form factor compatible with helicopter EO/IR turret integration.'},{t:'Torrey Pines Logic — Sentinel S45',u:'https://tplogic.com/optical-detection/sentinel-s45/',type:'product',d:'Sentinel S45 passive optical sensor compact enough for helicopter nose-station or chin turret integration.'}]}},
  {n:"Magnetic Anomaly Detector Grid",cat:"Detection",desc:"High-sensitivity fluxgate magnetometers detecting permanent magnets in brushless motors.",cost:"$300–$900/sensor",ct:0,cn:600,feas:"Medium", bd:[{k:"Fluxgate Sensors",v:"55%"},{k:"Telemetry",v:"30%"},{k:"Power",v:"15%"}], fj:[{k:"TRL",v:"6 (Proto)"},{k:"Weather",v:"Immune"},{k:"Limit",v:"Short Range"}], ev:[{t:"PNI Low-SWaP",u:"https://www.pnisensor.com/low-swap-magnetometer-drone-swarms/",type:"news",d:"Networks of low-SWaP fluxgate magnetometers successfully monitor magnetic anomalies to detect the permanent magnets in drone brushless motors."},{t:"Defense Advancement",u:"https://www.defenseadvancement.com/suppliers/drone-magnetometers/",type:"news",d:"Magnetic Anomaly Detectors (MAD) offer completely passive, all-weather detection of heavy-spooled FOG drones with zero EM emissions."}],rw:{score:5,label:'MAD is a proven helicopter system but not optimised for drone detection',notes:'Magnetic anomaly detectors (MAD) are a standard ASW sensor on maritime patrol helicopters (MH-60R, NH90). Detecting small carbon-fibre FOG drones via MAD is challenging because their ferrous metal content is minimal. However, motor magnets and battery packs create a detectable signature at close range. MAD-XR on MH-60R is entering production, and recalibrating it for small drone signatures is technically feasible.',ev:[{t:'Lockheed Martin — MH-60R MAD-XR Integration',u:'https://news.lockheedmartin.com/2025-06-18-Sikorsky-and-CAE-Bring-Digital-Magnetic-Anomaly-Detection-Capability-to-MH-60R-Maritime-Helicopters',type:'news',d:'CAE MAD-XR magnetic anomaly detector enters production on MH-60R Seahawk — provides the fielded helicopter MAD platform for adaptation to small-drone detection.'},{t:'Vertical Mag — CAE MAD-XR in Production',u:'https://verticalmag.com/press-releases/cae-mad-xr-magnetic-anomaly-detection-system-enters-production/',type:'news',d:'MAD-XR enters production with helicopter integration confirmed — future software updates could add small-drone magnetic signature profiles.'}]}},
  {n:"AI Vapor Trail Tracker",cat:"Detection",desc:"Neural net trained on optical glint of fiber cable to track trajectory back to operator.",cost:"$5,000–$20,000/system",ct:2,cn:12000,feas:"Medium", bd:[{k:"Optics/Camera",v:"45%"},{k:"AI Compute Unit",v:"45%"},{k:"Mounting",v:"10%"}], fj:[{k:"TRL",v:"4 (Concept)"},{k:"SWaP",v:"Med"},{k:"Limit",v:"Lighting Dep."}], ev:[{t:"MIT Contrail Detection",u:"https://dspace.mit.edu/handle/1721.1/124179",type:"academic",d:"Convolutional Neural Networks (CNNs) accurately detect and trace condensation trails and fiber glint in satellite and long-exposure imagery."},{t:"MDPI Aerospace Study",u:"https://www.mdpi.com/2226-4310/10/7/578",type:"academic",d:"Advanced AI tracking algorithms successfully utilize geostationary IR imagery to trace aerial trajectories back to their exact launch locations."},{t:'RBC-Ukraine — Fiber-optic FPV Drones & Countermeasures',u:'https://newsukraine.rbc.ua/analytics/russia-s-fiber-optic-fpv-drones-on-rise-ukraine-1752818725.html',type:'news',d:'Analysis of AI-based tracking techniques being developed to follow FOG drone tethers and vapor/fiber trails.'},{t:'Defense Mirror — Russian Radar Tracks FOG Drone Fiber Cables',u:'https://defensemirror.com/news/39880/New_Russian_Radar_Tracks_Drones_Having_Fibre_Optic_Cables__AI_Brain',type:'news',d:'Russia deploys AI-powered radar system specifically designed to detect and track fiber-optic drone cable trails.'},{t:'Lowy Institute — Fibre-optic Drones Reshape Ukraine War',u:'https://www.lowyinstitute.org/the-interpreter/fibre-optic-drones-reshape-ukraine-s-technological-war',type:'news',d:'Strategic analysis of how FOG drones are reshaping the battlefield and spurring AI trail-tracking countermeasures.'}],rw:{score:7,label:'Helicopter EO/IR turret + AI ideal platform for tether trail tracking',notes:'A helicopter at altitude has a superior downward-looking geometry to detect the thin fiber-optic tether of a FOG drone against ground clutter. Modern FLIR turrets (WESCAM MX-15D) have sufficient resolution, and AI classification (analogous to Marduk Technologies\' passive optical system) can run on a mission computer. The helicopter can then fly the tether to its ground operator.',ev:[{t:'Marduk Technologies — Passive Optical FOG Detection',u:'https://marduk.ee/news/the-growing-threat-of-fiber-optic-uavs-and-how-to-see-them-coming',type:'news',d:'Marduk\'s passive optical AI system detects FOG tethers — the algorithm is platform-agnostic and suitable for helicopter EO/IR turret integration.'},{t:'Defense Mirror — Russian AI Radar Tracks FOG Cables',u:'https://defensemirror.com/news/39880/New_Russian_Radar_Tracks_Drones_Having_Fibre_Optic_Cables__AI_Brain',type:'news',d:'Russia develops AI-powered radar tracking FOG drone fiber cables, validating that tether AI tracking is an active operational concept.'}]}},
  {n:"Infrasound Detection Array",cat:"Detection",desc:"Low-frequency microphones (1–20 Hz) detecting infrasound from large rotor blades.",cost:"$800–$2,500/sensor",ct:0,cn:1600,feas:"Medium", bd:[{k:"LF Microphones",v:"50%"},{k:"DSP Unit",v:"35%"},{k:"Telemetry",v:"15%"}], fj:[{k:"TRL",v:"6 (Fielded)"},{k:"Range",v:"High"},{k:"Limit",v:"Heavy Drones"}], ev:[{t:"QuakeLogic SIS-1",u:"https://blog.quakelogic.net/uav-detection-using-infrasound-the-power-of-sis-1-infrasound-sensors/",type:"news",d:"Low-frequency (1-20 Hz) infrasound sensors reliably detect heavy-rotor drones at ranges of 1-3km, remaining completely unaffected by wind noise."},{t:"NASA Infrasound Tech",u:"https://technology.nasa.gov/patent/LAR-TOPS-281",type:"academic",d:"NASA-patented infrasound technologies successfully track low-altitude UAS in dense urban areas by isolating their unique low-frequency acoustic signatures."},{t:'QuakeLogic — AURA-ID Infrasound Drone Detection',u:'https://products.quakelogic.net/product/quakelogic-aura-id-passive-infrasound-drone-detection-system/',type:'product',d:'Official product page for AURA-ID passive infrasound drone detection array, detecting UAVs via sub-20Hz acoustic signatures.'}],rw:{score:2,label:'Helicopter vibration and rotor noise mask infrasound signatures',notes:'Helicopter rotor systems generate strong infrasonic vibrations (2–20 Hz) that would overwhelm any infrasound drone signature at useful range. QuakeLogic AURA-ID ground arrays operate in the 0.1–20 Hz range — directly competing with helicopter structural vibration. The only viable use is as a ground-deployed node relaying alerts to the helicopter via datalink.',ev:[{t:'QuakeLogic — AURA-ID Infrasound Drone Detection',u:'https://products.quakelogic.net/product/quakelogic-aura-id-passive-infrasound-drone-detection-system/',type:'product',d:'AURA-ID infrasound detection array is a ground-fixed system — alerts can be relayed to helicopter crews but the sensor is not helicopter-mountable.'}]}},

ws',d:'Epirus Leonidas confirmed defeating a FOG drone — helicopter-mounted Leonidas Pod would provide airborne HPM coverage against FOG drone attacks.'}]}},

  {n:"Photonic Crystal Disruption Laser",cat:"Directed Energy",desc:"Tunable laser matched to fiber window to inject high-power backscatter into the GCS.",cost:"$500K–$2M (R&D stage)",ct:4,cn:1250000,feas:"Low-Medium", bd:[{k:"Fiber Laser",v:"60%"},{k:"Optics/Relay",v:"25%"},{k:"Cooling",v:"15%"}], fj:[{k:"TRL",v:"3 (R&D)"},{k:"Defeat",v:"Total"},{k:"Limit",v:"Beam Align."}], ev:[{t:"DTIC Fiber Lasers",u:"https://dsiac.dtic.mil/technical-inquiries/notable/state-of-art-fiber-lasers-to-support-ongoing-directed-energy-de-efforts/",type:"news",d:"State-of-the-art photonic crystal fiber lasers deliver extreme high-power beams optimized for directed energy counter-UAS applications."},{t:"IEEE Spectrum DEW",u:"https://spectrum.ieee.org/fiber-lasers-mean-ray-guns-are-coming",type:"news",d:"Tunable hollow-core fiber lasers match 1310/1550nm transmission windows to inject massive backscatter, permanently destroying the GCS display."}],rw:{score:3,label:'Experimental TRL; helicopter integration still research-phase',notes:'Photonic crystal disruption lasers are at TRL 2–3 with no fielded systems. While laser pods exist on helicopters (DIRCM, CIRCM), adapting them to photonic-crystal band-disruption frequencies requires new quantum emitter technology not yet miniaturised for airborne use. A 5–10 year development horizon makes helicopter integration speculative.',ev:[]}},

  {n:"AI Cable Tracker System",cat:"Swarm / AI",desc:"Autonomous drone with downward camera using neural net to follow fiber glint back to launch.",cost:"$8,000–$25,000/system",ct:2,cn:16000,feas:"Medium", bd:[{k:"UAV Platform",v:"40%"},{k:"Optical Sensors",v:"35%"},{k:"Edge AI",v:"25%"}], fj:[{k:"TRL",v:"5 (Field)"},{k:"Latency",v:"Low"},{k:"Limit",v:"Ground Clutter"}], ev:[{t:"Marduk Technologies",u:"https://marduk.ee/news/the-growing-threat-of-fiber-optic-uavs-and-how-to-see-them-coming",type:"news",d:"High-resolution optical tracking and edge-AI algorithms accurately detect the faint ground glint of fiber-optic cables from loitering guard drones."},{t:"arXiv Vision Tracker",u:"https://arxiv.org/html/2407.14352v3",type:"academic",d:"Deep learning models (ConvNeXt) process aerial imagery to detect ultra-thin power and fiber lines for rapid autonomous avoidance or tracking."},{t:'arXiv — Vision-Based Power Line & Cable Detection',u:'https://arxiv.org/html/2407.14352v1',type:'paper',d:'Research on vision-based AI detection of power lines and cables from low-flying aircraft, directly applicable to FOG tether tracking.'},{t:'Marduk Technologies — Passive Optical FOG Detection',u:'https://marduk.ee/news/the-growing-threat-of-fiber-optic-uavs-and-how-to-see-them-coming',type:'news',d:'Marduk Technologies\' passive optical system detects fiber-optic drone tethers, enabling AI cable tracking for C-UAS.'}],rw:{score:8,label:'Helicopter FLIR + AI — optimal geometric platform for tether detection',notes:'An AI cable tracker running on a helicopter mission computer with inputs from the FLIR turret has ideal downward-looking geometry: the tether is most visible against sky from below and against ground from above. A helicopter can follow a detected tether to its ground-control node and destroy the operator, converting a defensive sensor into an offensive cueing tool.',ev:[{t:'Marduk Technologies — FOG Tether Optical Detection',u:'https://marduk.ee/news/the-growing-threat-of-fi   {n:"RF Mesh Decoy Swarm",cat:"Swarm / AI",desc:"Miniature drones broadcasting RF signatures to attract and waste enemy kinetic effectors.",cost:"$500–$1,500/decoy",ct:0,cn:1000,feas:"Medium-High", bd:[{k:"RF Payload",v:"55%"},{k:"Drone Chassis",v:"35%"},{k:"Battery",v:"10%"}], fj:[{k:"TRL",v:"8 (Deployed)"},{k:"Scalability",v:"High"},{k:"Limit",v:"Battery Life"}], ev:[{t:"Navy LEED Program",u:"https://www.twz.com/news-features/more-money-for-flying-drone-that-makes-missiles-think-its-a-warship-on-navy-wishlist",type:"news",d:"The U.S. Navy successfully deploys long-endurance autonomous swarms to broadcast high-power RF, overwhelming enemy EW and radar systems."},{t:"CEPA Decoy Warfare",u:"https://cepa.org/article/the-phony-war-ukraine-and-russias-decoy-drones/",type:"news",d:"Combat analysis shows RF decoy drones utilizing Luneberg lenses successfully attract kinetic effectors, protecting high-value FOG interceptors."},{t:'Wikipedia — AN/ALQ-260 BriteCloud RF Decoy',u:'https://en.wikipedia.org/wiki/BriteCloud',type:'wiki',d:'Reference entry for BriteCloud miniature active RF decoy, the basis for expendable RF mesh decoy swarm concepts.'}],rw:{score:9,label:'Helicopters already carry chaff/flare decoy dispensers — RF decoy is an upgrade',notes:'AN/ALE-47 and M130 countermeasure dispensers on AH-64, CH-47, and UH-60 already deploy chaff and IR flares. Replacing some cartridge slots with miniature BriteCloud-style active RF decoys is a logistical substitution requiring no structural modification. The AN/ALQ-144 IR jammer is also already fitted, confirming helicopter EW decoy architecture.',ev:[{t:'GlobalSecurity.org — AN/ALE-47 on Helicopters',u:'https://www.globalsecurity.org/military/systems/aircraft/systems/an-ale-47.htm',type:'news',d:'AN/ALE-47 CMDS installed on AH-64 Apache and CH-47 Chinook — existing dispenser positions accept RF active decoy cartridges like BriteCloud.'},{t:'FAS — M130 General Purpose Dispenser',u:'https://man.fas.org/dod-101/sys/ac/equip/m-130.htm',type:'news',d:'M130 dispenser on CH-47, MH-47, EH-60 — same dispenser hardware accepts active RF decoy rounds in place of M206 IR flares.'},{t:'Wikipedia — AN/ALQ-260 BriteCloud',u:'https://en.wikipedia.org/wiki/BriteCloud',type:'wiki',d:'BriteCloud active RF decoy is cartridge-form-factor — drop-in replacement for chaff rounds in helicopter ALE-47 dispensers.'}]}},
  {n:"Autonomous Perimeter Guard Drone",cat:"Swarm / AI",desc:"VTOL loitering drones with sensor fusion that transition autonomously to intercept mode.",cost:"$15,000–$40,000/unit",ct:2,cn:27000,feas:"Medium-High", bd:[{k:"VTOL Airframe",v:"45%"},{k:"Sensor Suite",v:"35%"},{k:"AI Compute",v:"20%"}], fj:[{k:"TRL",v:"7 (Deployed)"},{k:"Autonomy",v:"High"},{k:"Limit",v:"Maintenance"}], ev:[{t:"Fortem DroneHunter",u:"https://fortemtech.com/products/dronehunter-f700/",type:"news",d:"Fully autonomous VTOL interceptors utilize onboard radar and sensor fusion to patrol perimeters and intercept threats with zero operator input."},{t:"SCI AeroGuard",u:"https://www.sci.com/aeroguard/",type:"news",d:"AeroGuard drones provide rapid-response kinetic interdiction, launching automatically upon sensor cueing to defeat FOGs at 300-600m ranges."},{t:'Skydio — X10D Defense Drone',u:'https://www.skydio.com/x10d',type:'product',d:'Official page for Skydio X10D autonomous perimeter guard drone with AI obstacle avoidance and threat detection.'},{t:'PitchBook — Nightingale Security Profile',u:'https://pitchbook.com/profiles/company/167958-82',type:'news',d:'Company profile for Nightingale Security, a leading autonomous perimeter drone-in-a-box guard system provider.'},{t:'Magos Systems — Nightingale Security Partnership',u:'https://magossystems.com/nightingale-security-partners/',type:'news',d:'Magos radar and Nightingale autonomous guard drones integrated for comprehensive perimeter drone defense.'}],rw:{score:7,label:'Helicopter-deployed autonomous guard drones — FARP and LZ protection',notes:'Skydio X10D and similar autonomous guard drones can be landed from a helicopter to establish persistent perimeter surveillance at a FARP or LZ. The helicopter then departs, leaving the autonomous drone network to detect inbound FOG drones and relay alerts. Recovery is by landing on the helicopter\'s deck or pre-positioned pad. This turns a helicopter into a mobile guard-drone deployment platform.',e // ── Persistent anonymous voter identity (UUID stored in localStorage) ──────
function getVoterId() {
  let id = LS.get(VOTER_ID_KEY);
  if (!id) {
    // Generate a random UUID v4
    id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    LS.set(VOTER_ID_KEY, id);
  }
  return id;
}

function setLiveIndicator(on) {
  document.getElementById('sb-dot').classList.toggle('live', on);
}

// ── Load all votes on boot (cache → Supabase) ─────────────────────────────
async function loadVotes() {
  // Render instantly from LS cache while network request runs
  const cached = LS.get(VOTES_LS_KEY);
  if (cached) {
    try {
      const p = JSON.parse(cached);
      DATA.forEach(d => { d.votes = p[d.id] ?? 0; });
    } catch(e) {}
    rf();
  }

  try {
    const voterId = getVoterId();

    // Parallel fetch: aggregate counts + this voter's existing votes
    const [countResp, myResp] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/votes?select=item_id,count&order=item_id`, { headers: SB_HEADERS }),
      fetch(`${SB_URL}/rest/v1/vote_records?select=item_id,value&voter_id=eq.${encodeURIComponent(voterId)}`, { headers: SB_HEADERS })
    ]);

    if (!countResp.ok) throw new Error(countResp.status);
    const rows = await countResp.json();
    rows.forEach(row => {
      const d = DATA.find(x => x.id === row.item_id);
      if (d) d.votes = row.count;
    });

    // Apply this voter's prior votes (may 404 if vote_records table not yet created — gracefully skip)
    if (myResp.ok) {
      const myRows = await myResp.json();
      myRows.forEach(row => {
        const d = DATA.find(x => x.id === row.item_id);
        if (d) d.myVote = row.value;  // 1 or -1
      });
    }

    // Refresh LS cache
    const lv = {};
    DATA.forEach(d => { lv[d.id] = d.votes; });
    LS.set(VOTES_LS_KEY, JSON.stringify(lv));
    setLiveIndicator(true);
    rf();
  } catch(e) {
    setLiveIndicator(false);
  }
}

// ── Update vote UI for a specific card ────────────────────────────────────
function updateVoteUI(voteWrap, item) {
  const cnt    = voteWrap.querySelector('.vcnt');
  const upBtn  = voteWrap.querySelector('.vbtn.v-up');
  const dnBtn  = voteWrap.querySelector('.vbtn.v-down');
  if (!cnt) return;

  cnt.textContent = item.votes;
  cnt.style.color = item.votes > 0 ? '#059669' : item.votes < 0 ? '#ef4444' : 'var(--cc,var(--accent))';
  cnt.classList.remove('pop');
  void cnt.offsetWidth;
  cnt.classList.add('pop');
  setTimeout(() => cnt.classList.remove('pop'), 250);

  upBtn.classList.toggle('voted', item.myVote === 1);
  dnBtn.classList.toggle('voted', item.myVote === -1);
}

// ── Vote click handler ────────────────────────────────────────────────────
document.getElementById('grid').addEventListener('click', async (e) => {
  const btn = e.target.closest('.vbtn');
  if (!btn) return;
  const voteWrap = btn.closest('.cvote');
  if (!voteWrap) return;
  if (btn.disabled) return;

  const id       = +voteWrap.dataset.id;
  const item     = DATA.find(x => x.id === id);
  const isUp     = btn.classList.contains('v-up');
  const dir      = isUp ? 1 : -1;
  const voterId  = getVoterId();

  // Determine optimistic outcome (toggle/switch logic mirrors server)
  const prevVote  = item.myVote || 0;
  let   newVote, voteDelta;
  if (prevVote === dir) {
    // Same button clicked again → undo vote
    newVote   = 0;
    voteDelta = -dir;
  } else if (prevVote !== 0) {
    // Switched direction (up→down or down→up)
    newVote   = dir;
    voteDelta = 2 * dir;
  } else {
    // Fresh vote
    newVote   = dir;
    voteDelta = dir;
  }

  // Optimistic UI update
  item.votes  += voteDelta;
  item.myVote  = newVote;

  // Floating animation
  const floatEl = document.createElement('span');
  floatEl.className = `vote-float ${voteDelta > 0 ? 'up' : 'down'}`;
  floatEl.textContent = voteDelta > 0 ? `+${voteDelta}` : `${voteDelta}`;
  voteWrap.appendChild(floatEl);
  setTimeout(() => floatEl.remove(), 700);

  if (aSort === 'votes-desc') rf();
  else updateVoteUI(voteWrap, item);

  // Disable buttons briefly to prevent double-tap
  voteWrap.querySelectorAll('.vbtn').forEach(b => b.disabled = true);

  // Persist to Supabase via cast_vote RPC
  try {
    const resp = await fetch(`${SB_URL}/rest/v1/rpc/cast_vote`, {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify({ p_item_id: id, p_direction: dir, p_voter_id: voterId })
    });

    if (resp.ok) {
      const result = await resp.json();
      item.votes  = result.count;
      item.myVote = result.your_vote;
    } else {
      // cast_vote not deployed yet — fall back to legacy vote() RPC
      const legacyResp = await fetch(`${SB_URL}/rest/v1/rpc/vote`, {
        method: 'POST',
        headers: SB_HEADERS,
        body: JSON.stringify({ p_item_id: id, p_delta: voteDelta })
      });
      if (legacyResp.ok) {
        item.votes = await legacyResp.json();
      }
    }

    // Update cache
    const lv = JSON.parse(LS.get(VOTES_LS_KEY) || '{}');
    lv[id] = item.votes;
    LS.set(VOTES_LS_KEY, JSON.stringify(lv));

    if (aSort === 'votes-desc') rf();
    else updateVoteUI(voteWrap, item);
  } catch(err) {
    console.warn('Vote sync failed, using optimistic value:', err);
  } finally {
    voteWrap.querySelectorAll('.vbtn').forEach(b => b.disabled = false);
  }
});

function matchSlider(d){
  if(aCSlider>=5)return true;
  return d.cn<=[0,1000,10000,100000,1000000][aCSlider];
}

function getFiltered(){
  return DATA.filter(d=>{
    const q=aQ.toLowerCase();
    return (aCat==='all'||d.cat===aCat)
      &&(aFeas.has('all')||aFeas.has(d.feas))
      &&(aCost.has('all')||aCost.has(String(d.ct)))
      &&matchSlider(d)
      &&(aRW===0||(d.rw?.score??0)>=aRW)
      &&(!q||d.n.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q)||d.cat.toLowerCase().includes(q));
  });
}

function getSorted(arr){
  const a=[...arr];
  switch(aSort){
    case 'votes-desc':return a.sort((x,y)=>y.votes-x.votes);
    case 'feas-desc':return a.sort((x,y)=>FORD.indexOf(x.feas)-FORD.indexOf(y.feas));
    case 'feas-asc':return a.sort((x,y)=>FORD.indexOf(y.feas)-FORD.indexOf(x.feas));
    case 'cost-asc':return a.sort((x,y)=>x.cn-y.cn);
    case 'cost-desc':return a.sort((x,y)=>y.cn-x.cn);
    case 'name':return a.sort((x,y)=>x.n.localeCompare(y.n));
    case 'rw-desc':return a.sort((x,y)=>(y.rw?.score??0)-(x.rw?.score??0));
    case 'rw-asc':return a.sort((x,y)=>(x.rw?.score??0)-(y.rw?.score??0));
    default:return a;
  }
}
