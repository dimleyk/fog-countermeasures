<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOG Countermeasures — 55 Innovative Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  /* High Contrast Light Palette */
  --bg: #ffffff;
  --surface: #f8fafc;
  --card: #ffffff;
  --border: #e2e8f0;
  --border-hi: #cbd5e1;
  --accent: #0284c7;
  --accent2: #ea580c;
  --text: #0f172a;
  --muted: #64748b;
  --text-dim: #334155;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.5;}

/* HEADER */
header{position:relative;padding:52px 40px 36px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#f1f5f9 0%,var(--bg) 100%);overflow:hidden;}
header::before{content:'';position:absolute;top:-60px;left:-60px;right:-60px;bottom:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,0,0,.03) 0%,transparent 70%);pointer-events:none;}
.header-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end;}
.threat-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--accent2);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.threat-badge::before{content:'';display:inline-block;width:7px;height:7px;background:var(--accent2);border-radius:50%;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,5.5vw,72px);letter-spacing:2px;line-height:1;color:var(--text);}
h1 span{color:var(--accent);}
.subtitle{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);margin-top:10px;letter-spacing:1px;}
.stats-row{display:flex;gap:24px;align-items:flex-end;}
.stat{text-align:right;font-family:'IBM Plex Mono',monospace;}
.stat-num{font-size:34px;font-weight:600;color:var(--accent);line-height:1;}
.stat-label{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:3px;}

/* FILTER PANEL */
.filter-panel{max-width:1400px;margin:0 auto;padding:0 40px;}
.filter-section{padding:16px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.fgl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;width:96px;flex-shrink:0;font-weight:600;}
.fchips{display:flex;gap:7px;flex-wrap:wrap;flex:1;}
.chip{padding:6px 14px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;cursor:pointer;border-radius:3px;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
.chip:hover{border-color:var(--cc,var(--accent));color:var(--cc,var(--accent));}
.chip.active{background:var(--cc,var(--accent));color:#fff;border-color:var(--cc,var(--accent));font-weight:700;}
.range-wrap{display:flex;align-items:center;gap:16px;flex:1;}
.range-out{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);min-width:130px;font-weight:600;}
input[type=range]{flex:1;max-width:300px;-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);border:none;}
.search-wrap{position:relative;margin-left:auto;}
.search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
input[type=search]{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px 7px 32px;font-family:'IBM Plex Mono',monospace;font-size:13px;border-radius:3px;width:220px;outline:none;transition:border-color .15s;}
input[type=search]:focus{border-color:var(--accent);}
input[type=search]::placeholder{color:var(--muted);}

/* ACTIVE TAGS */
.active-bar{max-width:1400px;margin:0 auto;padding:10px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:46px;border-bottom:1px solid var(--border);}
.atag{display:flex;align-items:center;gap:5px;padding:4px 11px;background:rgba(0,0,0,.03);border:1px solid var(--border);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;border-radius:3px;text-transform:uppercase;}
.atag button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:13px;line-height:1;padding:0 0 0 4px;}
.clear-all-btn{margin-left:auto;padding:4px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:3px;text-transform:uppercase;transition:all .15s;}
.clear-all-btn:hover{border-color:var(--accent);color:var(--accent);}

/* SORT BAR */
.sort-bar{max-width:1400px;margin:0 auto;padding:11px 40px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-right:4px;font-weight:600;}
.sbtn{padding:5px 12px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;border-radius:3px;text-transform:uppercase;transition:all .15s;}
.sbtn:hover,.sbtn.active{border-color:var(--accent);color:var(--accent);background:var(--surface);}
.rcnt{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text-dim);letter-spacing:1px;}

/* GRID — default 2-col */
.grid{max-width:1400px;margin:0 auto;padding:28px 40px 56px;display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
@media(max-width:900px){.grid{grid-template-columns:1fr;}}

/* card-body always flex-col so gap/spacing works in both views */
.card-body{display:flex;flex-direction:column;gap:12px;flex:1;min-width:0;}
/* In 2-col grid view the infographic sits below card-body, full width */
.grid:not(.view-list) .cinfographic{margin-top:4px;}

/* LIST VIEW — card splits into 50% info / 50% infographic */
.grid.view-list{grid-template-columns:1fr;}
.grid.view-list .card{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:auto 1fr;
  gap:0 20px;
  align-items:start;
}
.grid.view-list .ch{
  grid-column:1 / -1;
  border-bottom:1px solid var(--border);
  padding-bottom:12px;
  margin-bottom:4px;
}
.grid.view-list .card-body{
  grid-column:1;
  grid-row:2;
  gap:10px;
}
.grid.view-list .ccarousel{
  grid-column:2;
  grid-row:2;
  margin-top:0;
  display:flex;
  flex-direction:column;
  min-height:240px;
}
.grid.view-list .ccarousel-view{
  flex:1;
  min-height:180px;
}
.grid.view-list .ccarousel .carousel-track,
.grid.view-list .ccarousel .carousel-slide{
  height:100%;
}
.grid.view-list .ccarousel .cs-img,
.grid.view-list .ccarousel iframe{
  height:100%;
  min-height:180px;
  object-fit:cover;
}
/* Comments span full width in list view */
.grid.view-list .ccomments{
  grid-column:1 / -1;
}

/* COMMENTS */
.ccomments{margin-top:4px;border-top:1px solid var(--border);padding-top:12px;}
.cc-toggle{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0;transition:color .15s;}
.cc-toggle:hover{color:var(--accent);}
.cc-toggle svg{flex-shrink:0;}
.cc-toggle .cc-badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;min-width:16px;text-align:center;}
.cc-body{display:none;margin-top:10px;flex-direction:column;gap:8px;}
.cc-body.open{display:flex;}
.cc-list{display:flex;flex-direction:column;gap:7px;}
.cc-item{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:9px 12px;}
.cc-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.cc-text{font-size:13px;color:var(--text-dim);line-height:1.6;}
.cc-form{display:flex;gap:6px;margin-top:4px;}
.cc-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 11px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;border-radius:4px;outline:none;transition:border-color .15s;resize:none;}
.cc-input:focus{border-color:var(--accent);}
.cc-submit{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .15s;white-space:nowrap;align-self:flex-end;}
.cc-submit:hover{background:#0369a1;}
.cc-submit:disabled{opacity:.5;cursor:default;}
.cc-empty{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:0;margin-left:12px;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.vtbtn{background:transparent;border:none;padding:5px 10px;cursor:pointer;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.vtbtn:hover{background:var(--surface);color:var(--text);}
.vtbtn.active{background:var(--accent);color:#fff;}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:22px;position:relative;transition:all .2s;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,0.02);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,var(--accent));opacity:0;transition:opacity .2s;border-radius:5px 5px 0 0;}
.card:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);z-index:10;}
.card:hover::before{opacity:1;}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.cnum{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--muted);letter-spacing:1px;flex-shrink:0;padding-top:4px;}
.ccat{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 9px;border-radius:3px;white-space:nowrap;margin-top:4px;}

/* ENHANCED VOTE COMPONENT */
.cvote{display:flex;flex-direction:column;align-items:center;gap:1px;border:1px solid var(--border);border-radius:10px;padding:6px 10px;margin-left:auto;background:var(--surface);min-width:56px;flex-shrink:0;position:relative;overflow:visible;transition:border-color .15s, box-shadow .15s;}
.cvote:hover{border-color:var(--border-hi);box-shadow:0 2px 12px rgba(0,0,0,.07);}
.vbtn{background:none;border:1px solid transparent;color:var(--muted);cursor:pointer;padding:5px 8px;border-radius:6px;transition:all .15s;line-height:1;width:38px;height:30px;display:flex;align-items:center;justify-content:center;}
.vbtn.v-up:hover{color:#059669;background:rgba(5,150,105,.09);border-color:rgba(5,150,105,.3);}
.vbtn.v-down:hover{color:#ef4444;background:rgba(239,68,68,.09);border-color:rgba(239,68,68,.3);}
.vbtn.v-up.voted{color:#fff;background:#059669;border-color:#059669;}
.vbtn.v-up.voted:hover{background:#047857;border-color:#047857;}
.vbtn.v-down.voted{color:#fff;background:#ef4444;border-color:#ef4444;}
.vbtn.v-down.voted:hover{background:#dc2626;border-color:#dc2626;}
.vcnt{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;min-width:36px;text-align:center;transition:color .2s, transform .15s;}
.cname{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);line-height:1.15;margin-top:4px;}
.cdesc{font-size:13.5px;line-height:1.75;color:var(--text-dim);flex:1;}

/* CAROUSEL — unified infographic + media viewer */
.ccarousel{border-radius:6px;overflow:hidden;border:1px solid var(--border);background:var(--surface);margin-top:4px;user-select:none;}
/* Inner view: provides overflow:hidden for sliding + positioning context for arrows */
.ccarousel-view{position:relative;overflow:hidden;}
.carousel-track{display:flex;transition:transform .32s cubic-bezier(.4,0,.2,1);}
.carousel-slide{flex-shrink:0;width:100%;position:relative;overflow:hidden;}
.carousel-slide .cs-img{width:100%;height:250px;object-fit:cover;display:block;}
.carousel-slide iframe{width:100%;height:250px;border:none;display:block;}

/* Filmstrip thumbnail row */
.car-strip{display:flex;gap:5px;padding:6px 7px 5px;overflow-x:auto;background:var(--surface);border-top:1px solid var(--border);-webkit-overflow-scrolling:touch;}
.car-strip::-webkit-scrollbar{height:3px;}
.car-strip::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
.car-strip-item{flex-shrink:0;width:54px;height:38px;border-radius:3px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s,opacity .15s;opacity:.55;background:#000;padding:0;position:relative;}
.car-strip-item img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.car-strip-item:hover{opacity:.85;}
.car-strip-item.active{border-color:var(--accent2);opacity:1;}
.car-strip-yt::after{content:'▶';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.25);pointer-events:none;}
.cs-thumb{position:relative;cursor:pointer;}
.cs-play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.28);transition:background .15s;}
.cs-thumb:hover .cs-play-overlay{background:rgba(0,0,0,.5);}
.cs-play-btn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.96);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 16px rgba(0,0,0,.3);transition:transform .15s,box-shadow .15s;}
.cs-thumb:hover .cs-play-btn{transform:scale(1.1);box-shadow:0 4px 24px rgba(0,0,0,.4);}
.cs-cap{position:absolute;bottom:0;left:0;right:0;padding:22px 10px 8px;background:linear-gradient(transparent,rgba(0,0,0,.75));font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.92);line-height:1.4;pointer-events:none;z-index:15;}
.cs-badge{position:absolute;top:8px;left:8px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;padding:2px 7px;border-radius:3px;font-weight:700;text-transform:uppercase;z-index:15;pointer-events:none;}
.cs-badge-infog{background:rgba(0,0,0,.5);color:#fff;}
.cs-badge-yt{background:rgba(234,88,12,.9);color:#fff;}
.cs-badge-img{background:rgba(0,0,0,.55);color:#fff;}
.car-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(4px);border:none;color:var(--text);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:20px;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,.18);padding:0;}
.car-nav:hover{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.car-prev{left:8px;}
.car-next{right:8px;}
.carousel-slide.cs-infog{cursor:zoom-in;}

/* EVIDENCE STYLING */
.cevid { margin-top: 8px; background: rgba(0,0,0,0.02); border-radius: 6px; padding: 14px; border-left: 3px solid var(--cc, var(--accent)); box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); border-left-width: 3px; }
.ev-header { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
.ev-header::after { content: ''; flex: 1; height: 1px; background: rgba(0,0,0,0.1); }
.ev-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
.ev-item { display: flex; flex-direction: column; gap: 6px; }
.ev-link-row { display: flex; align-items: center; gap: 8px; }
.ev-icon { width: 14px; height: 14px; opacity: 0.8; flex-shrink: 0; color: var(--cc, var(--accent)); }
.ev-link { color: var(--text); text-decoration: none; font-size: 12.5px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; }
.ev-link:hover { color: var(--accent); text-decoration: underline; }
.ev-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-left: 22px; padding: 8px 12px; background: rgba(0,0,0,0.04); border-radius: 4px; border-left: 2px solid rgba(0,0,0,0.1); position: relative; }

/* INFO TOOLTIP (COST & FEASIBILITY) */
.info-wrap { position: relative; display: inline-flex; align-items: center; margin-left: 6px; cursor: pointer; vertical-align: middle; }
.info-icon { width: 13px; height: 13px; color: var(--muted); transition: color 0.2s; }
.info-wrap:hover .info-icon,
.info-wrap.tip-open .info-icon { color: var(--accent); }
.info-tooltip {
  position: absolute; bottom: calc(100% + 8px); left: 50%;
  transform: translateX(var(--tip-tx,-50%)) translateY(4px);
  background: var(--card); border: 1px solid var(--border-hi); border-radius: 4px; padding: 12px;
  width: max-content; min-width: 180px; max-width: min(260px, 88vw);
  opacity: 0; visibility: hidden; transition: opacity .18s, visibility .18s, transform .18s;
  z-index: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.15); pointer-events: none;
}
/* Desktop hover */
@media (hover: hover) {
  .info-wrap:hover .info-tooltip {
    opacity: 1; visibility: visible;
    transform: translateX(var(--tip-tx,-50%)) translateY(0);
    pointer-events: all;
  }
}
/* JS-driven tap toggle (touch or click) */
.info-wrap.tip-open .info-tooltip {
  opacity: 1; visibility: visible;
  transform: translateX(var(--tip-tx,-50%)) translateY(0);
  pointer-events: all;
}
.info-tooltip::after {
  content: ''; position: absolute; top: 100%;
  left: var(--tip-arrow, 50%); transform: translateX(-50%);
  border-width: 5px; border-style: solid;
  border-color: var(--border-hi) transparent transparent transparent;
}
.tooltip-header { font-family:'IBM Plex Mono',monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.bd-row { display: flex; justify-content: space-between; font-family:'IBM Plex Mono',monospace; font-size: 10.5px; color: var(--text-dim); margin-bottom: 6px; gap: 20px; }
.bd-val { color: var(--text); font-weight: 600; text-align: right; }
.bd-total { display: flex; justify-content: space-between; font-family:'IBM Plex Mono',monospace; font-size: 11px; color: var(--accent); border-top: 1px dashed var(--border); padding-top: 6px; margin-top: 6px; font-weight: 700; }

.cfoot{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:6px;padding-top:14px;border-top:1px solid var(--border);}
.cm{display:flex;flex-direction:column;gap:4px;position:relative;}
.mlabel{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:600;}
.mval{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--text);}
.cbadge{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 8px;border-radius:3px;font-weight:700;display:inline-block;margin-top:2px;}
.fbar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px;}
.ffill{height:100%;border-radius:2px;}
.fval{font-family:'IBM Plex Mono',monospace;font-size:12px;margin-top:3px;font-weight:600;}
.nores{grid-column:1/-1;text-align:center;padding:80px;font-family:'IBM Plex Mono',monospace;color:var(--muted);font-size:14px;}

/* VOTE FLOAT ANIMATION */
@keyframes vfloat{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}100%{opacity:0;transform:translateX(-50%) translateY(-28px) scale(.8);}}
.vote-float{position:absolute;left:50%;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;pointer-events:none;animation:vfloat .65s ease-out forwards;z-index:200;white-space:nowrap;}
.vote-float.up{color:#059669;top:-4px;}
.vote-float.down{color:#ef4444;bottom:-4px;}
@keyframes vcnt-pop{0%{transform:scale(1);}40%{transform:scale(1.3);}100%{transform:scale(1);}}
.vcnt.pop{animation:vcnt-pop .22s ease-out;}


/* (legacy media gallery styles removed — replaced by .ccarousel) */

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .2s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox img{max-width:min(92vw,1100px);max-height:88vh;border-radius:8px;box-shadow:0 24px 80px rgba(0,0,0,.6);transform:scale(.94);transition:transform .22s;object-fit:contain;display:block;}
.lightbox.open img{transform:scale(1);}
.lb-close{position:fixed;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;backdrop-filter:blur(4px);line-height:1;}
.lb-close:hover{background:rgba(255,255,255,.28);}
.lb-caption{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7);text-align:center;pointer-events:none;white-space:nowrap;}
/* (infographic cursor now set on .carousel-slide.cs-infog above) */

/* SUPABASE LIVE INDICATOR */
.sb-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--muted);margin-left:10px;vertical-align:middle;transition:background .4s;}
.sb-dot.live{background:#059669;box-shadow:0 0 0 3px rgba(5,150,105,.2);}

body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999;}
/* Disable lift-on-hover on touch devices */
@media (hover: none) {
  .card:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
  .card:hover::before { opacity: 0; }
}

/* ── RESPONSIVE ─────────────────────────────────────────────────────────── */

/* Tablet (≤900px): single-column grid already set above */

/* Tablet + large phones */
@media (max-width: 768px) {
  /* Header */
  header { padding: 28px 16px 22px; }
  .header-inner { grid-template-columns: 1fr; gap: 14px; }
  h1 { font-size: clamp(32px, 9vw, 52px); }
  .subtitle { font-size: 11px; }
  .stats-row { justify-content: flex-start; gap: 16px; margin-top: 0; }
  .stat-num { font-size: 26px; }

  /* Filter panel */
  .filter-panel { padding: 0 16px; }
  .filter-section { gap: 8px; padding: 12px 0; }
  .fgl { width: 72px; font-size: 10px; }
  .fchips { gap: 5px; }
  .chip { padding: 5px 10px; font-size: 10px; }

  /* Range + search go full-width on their own row */
  .range-wrap { width: 100%; flex-basis: 100%; }
  input[type=range] { max-width: none; }
  .search-wrap { margin-left: 0; width: 100%; flex-basis: 100%; }
  input[type=search] { width: 100%; }

  /* Active bar */
  .active-bar { padding: 8px 16px; }

  /* Sort bar */
  .sort-bar { padding: 10px 16px; gap: 6px; }
  .sbtn { padding: 4px 9px; font-size: 10px; }
  .rcnt { font-size: 11px; }
  /* Keep view toggle at end of sort bar */
  .view-toggle { margin-left: auto; }

  /* Grid */
  .grid { padding: 16px 16px 48px; gap: 14px; }

  /* Card */
  .card { padding: 16px; gap: 10px; }
  .cname { font-size: 19px; }
  .cdesc { font-size: 13px; }

  /* Card footer: stack cost/tier/feasibility vertically */
  .cfoot { grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Evidence */
  .cevid { padding: 10px; }
  .ev-desc { margin-left: 0; }

  /* List view collapses to single column on tablet */
  .grid.view-list .card {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto;
  }
  .grid.view-list .ch { grid-column: 1; }
  .grid.view-list .card-body { grid-column: 1; grid-row: 2; }
  .grid.view-list .ccarousel {
    grid-column: 1; grid-row: 3;
    min-height: 220px; height: auto;
  }
  .grid.view-list .ccarousel-view { min-height: 160px; }
  .grid.view-list .ccarousel .cs-img,
  .grid.view-list .ccarousel iframe {
    height: 160px; min-height: unset;
  }

  /* Comments */
  .cc-form { flex-direction: column; }
  .cc-submit { align-self: flex-end; }
}

/* Small phones */
@media (max-width: 480px) {
  header { padding: 20px 12px 18px; }
  .filter-panel { padding: 0 12px; }
  .active-bar { padding: 8px 12px; }
  .sort-bar { padding: 8px 12px; gap: 4px; }
  .grid { padding: 12px 12px 40px; gap: 12px; }

  /* Hide some sort buttons to prevent wrap chaos — keep essentials */
  .sbtn[data-sort="feas-asc"],
  .sbtn[data-sort="cost-desc"] { display: none; }

  /* Squeeze the filter label down further */
  .fgl { display: none; }
  .filter-section { padding: 10px 0; }

  /* Card */
  .card { padding: 13px; }
  .cname { font-size: 17px; }
  .cnum { font-size: 14px; }

  /* Card footer: single column on tiny screens */
  .cfoot { grid-template-columns: 1fr; gap: 8px; }

  /* Vote component */
  .vcnt { font-size: 22px; }
  .vbtn { width: 32px; height: 26px; }

  /* Chips: allow horizontal scroll */
  .fchips { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .fchips::-webkit-scrollbar { height: 2px; }
  .fchips::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 1px; }
}

// ── Persistent anonymous voter identity (UUID stored in localStorage) ──────
function getVoterId() {
  let id = localStorage.getItem(VOTER_ID_KEY);
  if (!id) {
    // Generate a random UUID v4
    id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    localStorage.setItem(VOTER_ID_KEY, id);
  }
  return id;
}

// ── Load all votes on boot (cache → Supabase) ─────────────────────────────
async function loadVotes() {
  // Render instantly from localStorage cache while network request runs
  const cached = localStorage.getItem(VOTES_LS_KEY);
  if (cached) {
    try {
      const p = JSON.parse(cached);
      DATA.forEach(d => { d.votes = p[d.id] ?? 0; });
    } catch(e) {}
    rf();
  }

  try {
    const voterId = getVoterId();

    // Parallel fetch: aggregate counts + this voter's existing votes
    const [countResp, myResp] = await Promise.all([
      fetch(`${SB_URL}/rest/v1/votes?select=item_id,count&order=item_id`, { headers: SB_HEADERS }),
      fetch(`${SB_URL}/rest/v1/vote_records?select=item_id,value&voter_id=eq.${encodeURIComponent(voterId)}`, { headers: SB_HEADERS })
    ]);

    if (!countResp.ok) throw new Error(countResp.status);
    const rows = await countResp.json();
    rows.forEach(row => {
      const d = DATA.find(x => x.id === row.item_id);
      if (d) d.votes = row.count;
    });

    // Apply this voter's prior votes (may 404 if vote_records table not yet created — gracefully skip)
    if (myResp.ok) {
      const myRows = await myResp.json();
      myRows.forEach(row => {
        const d = DATA.find(x => x.id === row.item_id);
        if (d) d.myVote = row.value;  // 1 or -1
      });
    }

    // Refresh localStorage cache
    const lv = {};
    DATA.forEach(d => { lv[d.id] = d.votes; });
    localStorage.setItem(VOTES_LS_KEY, JSON.stringify(lv));
    setLiveIndicator(true);
    rf();
  } catch(e) {
    setLiveIndicator(false);
  }
}

function updateVoteUI(voteWrap, item) {
  const cnt    = voteWrap.querySelector('.vcnt');

  const dnBtn  = voteWrap.querySelector('.vbtn.v-down');

  cnt.classList.remove('pop');
  void cnt.offsetWidth;

  dnBtn.classList.toggle('voted', item.myVote === -1);
}

// ── Vote click handler ────────────────────────────────────────────────────
document.getElementById('grid').addEventListener('click', async (e) => {
  const btn = e.target.closest('.vbtn');
  if (!btn) return;
  const voteWrap = btn.closest('.cvote');
  if (!voteWrap) return;
  if (btn.disabled) return;

  const id       = +voteWrap.dataset.id;
  const item     = DATA.find(x => x.id === id);
  const isUp     = btn.classList.contains('v-up');
  const dir      = isUp ? 1 : -1;
  const voterId  = getVoterId();

  // Determine optimistic outcome (toggle/switch logic mirrors server)
  const prevVote  = item.myVote || 0;
  let   newVote, voteDelta;
  if (prevVote === dir) {
    // Same button clicked again → undo vote
    newVote   = 0;
    voteDelta = -dir;
  } else if (prevVote !== 0) {
    // Switched direction (up→down or down→up)
    newVote   = dir;
    voteDelta = 2 * dir;
  } else {
    // Fresh vote
    newVote   = dir;
    voteDelta = dir;
  }

  // Optimistic UI update
  item.votes  += voteDelta;
  item.myVote  = newVote;

  // Floating animation
  const floatEl = document.createElement('span');
  floatEl.className = `vote-float ${voteDelta > 0 ? 'up' : 'down'}`;
  floatEl.textContent = voteDelta > 0 ? `+${voteDelta}` : `${voteDelta}`;
  voteWrap.appendChild(floatEl);
  setTimeout(() => floatEl.remove(), 700);

  if (aSort === 'votes-desc') rf();
  else updateVoteUI(voteWrap, item);

  // Disable buttons briefly to prevent double-tap
  voteWrap.querySelectorAll('.vbtn').forEach(b => b.disabled = true);

  // Persist to Supabase via cast_vote RPC
  try {
    const resp = await fetch(`${SB_URL}/rest/v1/rpc/cast_vote`, {
      method: 'POST',
      headers: SB_HEADERS,
      body: JSON.stringify({ p_item_id: id, p_direction: dir, p_voter_id: voterId })
    });

    if (resp.ok) {
      const result = await resp.json();
      item.votes  = result.count;
      item.myVote = result.your_vote;
    } else {
      // cast_vote not deployed yet — fall back to legacy vote() RPC
      const legacyResp = await fetch(`${SB_URL}/rest/v1/rpc/vote`, {
        method: 'POST',
        headers: SB_HEADERS,
        body: JSON.stringify({ p_item_id: id, p_delta: voteDelta })
      });
      if (legacyResp.ok) {
        item.votes = await legacyResp.json();
      }
    }

    // Update cache
    const lv = JSON.parse(localStorage.getItem(VOTES_LS_KEY) || '{}');
    lv[id] = item.votes;
    localStorage.setItem(VOTES_LS_KEY, JSON.stringify(lv));

    if (aSort === 'votes-desc') rf();
    else updateVoteUI(voteWrap, item);
  } catch(err) {
    console.warn('Vote sync failed, using optimistic value:', err);
  } finally {
    voteWrap.querySelectorAll('.vbtn').forEach(b => b.disabled = false);
  }
});

function getSorted(arr){
  const a=[...arr];
  switch(aSort){
    case 'votes-desc':return a.sort((x,y)=>y.votes-x.votes);
    case 'feas-desc':return a.sort((x,y)=>FORD.indexOf(x.feas)-FORD.indexOf(y.feas));
    case 'feas-asc':return a.sort((x,y)=>FORD.indexOf(y.feas)-FORD.indexOf(x.feas));
    case 'cost-asc':return a.sort((x,y)=>x.cn-y.cn);
    case 'cost-desc':return a.sort((x,y)=>y.cn-x.cn);
    case 'name':return a.sort((x,y)=>x.n.localeCompare(y.n));
    default:return a;
  }
}

const CC_HEADERS = { ...SB_HEADERS };  // reuse Supabase headers

// Load all comments for a given item and render them
async function loadComments(itemId) {
  const listEl  = document.getElementById(`cc-list-${itemId}`);
  const cntEl   = document.getElementById(`cc-cnt-${itemId}`);
  if (!listEl) return;

  try {
    const resp = await fetch(
      `${SB_URL}/rest/v1/comments?item_id=eq.${itemId}&order=created_at.asc&select=text,created_at`,
      { headers: CC_HEADERS }
    );
    if (!resp.ok) return;
    const rows = await resp.json();

    // Update badge
    cntEl.textContent = rows.length || '';
    cntEl.style.display = rows.length ? '' : 'none';

    // Render list
    if (!rows.length) {
      listEl.innerHTML = '<div class="cc-empty">// NO COMMENTS YET</div>';
      return;
    }
    listEl.innerHTML = rows.map(r => {
      const ago = timeAgo(new Date(r.created_at));
      return `<div class="cc-item">
        <div class="cc-meta">${ago}</div>
        <div class="cc-text">${escHtml(r.text)}</div>
      </div>`;
    }).join('');
  } catch(e) { /* silent fail */ }
}

async function submitComment(itemId) {
  const inp = document.getElementById(`cc-inp-${itemId}`);
  const btn = inp.closest('.cc-form').querySelector('.cc-submit');
  const text = inp.value.trim();
  if (!text) return;

  btn.disabled = true;
  try {
    const resp = await fetch(`${SB_URL}/rest/v1/comments`, {
      method: 'POST',
      headers: { ...CC_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ item_id: itemId, text })
    });
    if (resp.ok) {
      inp.value = '';
      await loadComments(itemId);
    }
  } catch(e) { /* silent */ }
  btn.disabled = false;
}

function toggleComments(btn, itemId) {
  const body = document.getElementById(`cc-body-${itemId}`);
  const isOpen = body.classList.toggle('open');
  if (isOpen) loadComments(itemId);
}

  stopCarVideo(car);
  const total = +car.dataset.total;
  const idx = ((+car.dataset.idx || 0) + dir + total) % total;
  carGoto(car, idx);
}

function carGoto(car, idx) {
  car.dataset.idx = idx;
  car.querySelector('.carousel-track').style.transform = `translateX(-${idx * 100}%)`;
  // Sync filmstrip
  const strip = car.querySelector('.car-strip');
  if (strip) {
    const items = strip.querySelectorAll('.car-strip-item');
    items.forEach((t, i) => t.classList.toggle('active', i === idx));
    if (items[idx]) items[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  }
}

function playCarVideo(thumbEl, videoId) {
  const slide = thumbEl.closest('.carousel-slide');
  // Toggle: already playing? stop it
  const existing = slide.querySelector('iframe');
  if (existing) {
    existing.remove();
    thumbEl.style.display = '';
    return;
  }
  thumbEl.style.display = 'none';
  const iframe = document.createElement('iframe');
  iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  iframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
  iframe.allowFullscreen = true;
  slide.insertBefore(iframe, slide.querySelector('.cs-cap') || null);
}

function stopCarVideo(car) {
  car.querySelectorAll('.carousel-slide iframe').forEach(f => {
    const thumb = f.closest('.carousel-slide').querySelector('.cs-thumb');
    if (thumb) thumb.style.display = '';
    f.remove();
  });
}

// Allow Ctrl+Enter to submit
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const inp = e.target.closest('.cc-input');
    if (inp) {
      const id = +inp.id.replace('cc-inp-', '');
      submitComment(id);
    }
  }
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeAgo(date) {
  const s = Math.floor((Date.now() - date) / 1000);
  if (s < 60)  return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

// ── View toggle (list / 2-col grid) ──────────────────────────────────────
const gridEl   = document.getElementById('grid');
const vtList   = document.getElementById('vt-list');
const vtGrid   = document.getElementById('vt-grid');
const VIEW_KEY = 'fog_view_mode';

function applyView(mode) {
  gridEl.classList.toggle('view-list', mode === 'list');
  vtList.classList.toggle('active', mode === 'list');
  vtGrid.classList.toggle('active', mode === 'grid');
  localStorage.setItem(VIEW_KEY, mode);
}

vtList.addEventListener('click', () => applyView('list'));
vtGrid.addEventListener('click', () => applyView('grid'));

// Restore last-used view (default: grid)
applyView(localStorage.getItem(VIEW_KEY) || 'grid');

// ── INFO TOOLTIP — click toggle + overflow-safe repositioning ─────────────
document.addEventListener('click', e => {
  const wrap = e.target.closest('.info-wrap');

  // Close any open tooltip that was not the one just clicked
  document.querySelectorAll('.info-wrap.tip-open').forEach(el => {
    if (el !== wrap) el.classList.remove('tip-open');
  });

  if (!wrap) return;

  // Position the tooltip before showing it
  positionTooltip(wrap);
  wrap.classList.toggle('tip-open');
  e.stopPropagation();
});

function positionTooltip(wrap) {
  const tip = wrap.querySelector('.info-tooltip');
  if (!tip) return;

  // Reset to default so we can measure natural position
  wrap.style.removeProperty('--tip-tx');
  wrap.style.removeProperty('--tip-arrow');
  tip.style.removeProperty('left');

  // Make briefly visible-but-hidden to measure
  tip.style.visibility = 'hidden';
  tip.style.opacity    = '0';
  tip.style.display    = 'block';

  const tipRect  = tip.getBoundingClientRect();
  const vw       = window.innerWidth;
  const MARGIN   = 8; // px from screen edge

  let tx         = -50;   // default: centre on icon (%)
  let arrowLeft  = 50;    // default: centre arrow (%)

  if (tipRect.left < MARGIN) {
    // Overflows left — shift right
    const shift = MARGIN - tipRect.left;
    const tipW  = tipRect.width;
    tx = `calc(-50% + ${shift}px)`;
    // Move arrow left to stay above the icon
    const iconCx    = wrap.getBoundingClientRect().left + wrap.offsetWidth / 2;
    arrowLeft = Math.max(10, Math.min(90, ((iconCx - (tipRect.left + shift)) / tipW * 100)));
    arrowLeft = arrowLeft.toFixed(1) + '%';
  } else if (tipRect.right > vw - MARGIN) {
    // Overflows right — shift left
    const shift = tipRect.right - (vw - MARGIN);
    const tipW  = tipRect.width;
    tx = `calc(-50% - ${shift}px)`;
    const iconCx    = wrap.getBoundingClientRect().left + wrap.offsetWidth / 2;
    arrowLeft = Math.max(10, Math.min(90, ((iconCx - (tipRect.left - shift)) / tipW * 100)));
    arrowLeft = arrowLeft.toFixed(1) + '%';
  }

  wrap.style.setProperty('--tip-tx', tx);
  wrap.style.setProperty('--tip-arrow', typeof arrowLeft === 'number' ? arrowLeft + '%' : arrowLeft);

  tip.style.removeProperty('display');
  tip.style.removeProperty('visibility');
  tip.style.removeProperty('opacity');
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────
const lb    = document.getElementById('lightbox');
const lbImg = document.getElementById('lb-img');
const lbCap = document.getElementById('lb-caption');

function openLightbox(src, alt) {
  lbImg.src = src;
  lbCap.textContent = alt || '';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
  // slight delay before clearing src so close animation plays
  setTimeout(() => { lbImg.src = ''; }, 200);
}

// Delegate click on carousel infographic slides → open lightbox
// (also handled via inline onclick; this catches edge cases)
document.getElementById('grid').addEventListener('click', e => {
  const slide = e.target.closest('.carousel-slide.cs-infog');
  if (!slide) return;
  const img = slide.querySelector('img');
  if (img) openLightbox(img.src, slide.closest('.card')?.querySelector('.cname')?.textContent);
});

// Close on backdrop click or close button
lb.addEventListener('click', e => { if (e.target === lb) closeLightbox(); });
document.getElementById('lb-close').addEventListener('click', closeLightbox);

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && lb.classList.contains('open')) closeLightbox();
});

// Boot: render all cards immediately (votes = 0), then update with real counts
rf();
loadVotes();
</script>
